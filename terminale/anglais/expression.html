<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac English - Terminale</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #08090f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #ff006e, #00d4ff) 1;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.2);
        }
        h1 {
            background: linear-gradient(135deg, #ff006e, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .axis-label {
            display: inline-block;
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .progress {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 20px;
        }
        .question {
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #ff006e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ff006e;
        }
        .context {
            background: rgba(0, 212, 255, 0.1);
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.6;
            color: #b0d0ff;
            font-style: italic;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 12px;
            border: 2px solid #333;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .option:hover {
            border-color: #ff006e;
            background: rgba(255, 0, 110, 0.1);
        }
        .option.selected {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.3);
        }
        .option.correct {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.15);
        }
        .option.incorrect {
            border-color: #ff0000;
            background: rgba(255, 0, 0, 0.15);
        }
        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback.correct {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
            color: #90ff90;
        }
        .feedback.incorrect {
            background: rgba(255, 100, 100, 0.1);
            border-left: 4px solid #ff6464;
            color: #ff9999;
        }
        .explanation {
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.6;
            color: #c0c0c0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-submit {
            background: linear-gradient(135deg, #ff006e, #00d4ff);
            color: #fff;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-next {
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
            border: 2px solid #ff006e;
        }
        .btn-next:hover {
            background: rgba(255, 0, 110, 0.3);
        }
        .results {
            display: none;
            text-align: center;
        }
        .results.show { display: block; }
        .score-display {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff006e, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        .stars {
            font-size: 40px;
            margin: 20px 0;
            letter-spacing: 10px;
        }
        .result-code {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
            word-break: break-all;
            color: #ff006e;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #ff006e;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: #00d4ff;
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 22px; }
            .question { padding: 15px; }
            .score-display { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Bac English - Terminale</h1>
        <div class="axis-label" id="axis-label">Axis: Identities and Exchanges</div>
        <div class="progress"><span id="current">1</span> / 20</div>

        <div id="quiz-content">
            <div class="question">
                <div class="question-text" id="question-text"></div>
                <div class="context" id="context" style="display:none;"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="button-group">
                <button class="btn-submit" id="submit-btn" onclick="submitAnswer()">Validate</button>
                <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">Next</button>
            </div>
        </div>

        <div id="results" class="results">
            <h2>✨ Final Results</h2>
            <div class="score-display" id="final-score"></div>
            <div class="stars" id="stars"></div>
            <p id="message"></p>
            <div class="result-code" id="result-code"></div>
            <a href="/index.html" class="back-link">← Back to home</a>
        </div>
    </div>

    <script>
        const axisNames = {
            'identities': 'Identities and Exchanges',
            'spaces': 'Private and Public Spaces',
            'art': 'Art and Power',
            'innovation': 'Innovations'
        };

        const questions = [
            {
                axis: 'identities',
                text: "What word means 'to change someone's cultural identity'?",
                context: "The process of adopting a new culture and losing one's original traditions.",
                options: ["Assimilate", "Integrate", "Migrate", "Adapt"],
                correct: 0,
                explanation: "Assimilation refers to absorbing into a different culture; integration maintains both cultures."
            },
            {
                axis: 'identities',
                text: "Fill the blank: 'She _____ her heritage despite living abroad.'",
                context: "Talking about someone who maintains their cultural connections.",
                options: ["refused", "preserved", "abandoned", "ignored"],
                correct: 1,
                explanation: "'Preserved' means to keep or maintain something for the future."
            },
            {
                axis: 'identities',
                text: "Which linking word shows contrast?",
                options: ["Furthermore", "However", "Consequently", "Moreover"],
                correct: 1,
                explanation: "'However' introduces a contrasting idea; others show addition or consequence."
            },
            {
                axis: 'identities',
                text: "What does 'cultural diversity' mean?",
                context: "Understanding different ways of life in society.",
                options: ["Same culture everywhere", "Many different cultures coexisting", "Loss of traditions", "Separation of groups"],
                correct: 1,
                explanation: "Cultural diversity refers to the coexistence of multiple distinct cultures."
            },
            {
                axis: 'spaces',
                text: "Which describes a 'private space'?",
                options: ["Public square", "Your home", "Shopping mall", "Train station"],
                correct: 1,
                explanation: "Private spaces are personal areas like homes; public spaces are shared by everyone."
            },
            {
                axis: 'spaces',
                text: "Fill: 'Working from home has _____ the boundary between work and personal life.'",
                options: ["clarified", "blurred", "removed", "strengthened"],
                correct: 1,
                explanation: "'Blurred' means to make unclear or less distinct—fitting for mixing work/home."
            },
            {
                axis: 'spaces',
                text: "How do social media affect public vs private distinction?",
                context: "People share personal information on platforms seen by many.",
                options: ["They strengthen privacy", "They blur the boundaries", "They have no effect", "They create more public space"],
                correct: 1,
                explanation: "Social media allow private information to become public, blurring traditional boundaries."
            },
            {
                axis: 'spaces',
                text: "Which linking word adds information?",
                options: ["Despite", "Moreover", "Although", "Unless"],
                correct: 1,
                explanation: "'Moreover' adds additional supporting information; others show contrast or condition."
            },
            {
                axis: 'art',
                text: "Art can be a form of what?",
                options: ["Entertainment only", "Power and expression", "Business transaction", "Decoration alone"],
                correct: 1,
                explanation: "Art is a powerful form of expression and can challenge authority and beliefs."
            },
            {
                axis: 'art',
                text: "Which word means 'to make something understood through art'?",
                options: ["Create", "Convey", "Construct", "Combine"],
                correct: 1,
                explanation: "'Convey' means to communicate or make known; artists convey messages."
            },
            {
                axis: 'art',
                text: "Historical art often _____ political beliefs of its time.",",
                options: ["ignores", "reflects", "denies", "opposes"],
                correct: 1,
                explanation: "Art reflects the values, conflicts, and beliefs of its historical period."
            },
            {
                axis: 'art',
                text: "How does censorship relate to art and power?",
                context: "Governments sometimes try to control what artists can create.",
                options: ["It encourages creativity", "It demonstrates power over expression", "It has no effect", "It improves quality"],
                correct: 1,
                explanation: "Censorship is a form of control showing how power restricts artistic freedom."
            },
            {
                axis: 'innovation',
                text: "Technology innovation mainly means...",
                options: ["Making things cheaper", "Creating new solutions to problems", "Using old methods", "Avoiding change"],
                correct: 1,
                explanation: "Innovation is about creating new or improved technologies to solve problems."
            },
            {
                axis: 'innovation',
                text: "Artificial Intelligence is changing society because...",
                context: "AI affects healthcare, work, and daily life.",
                options: ["It never works", "It processes data and makes decisions", "It's only theoretical", "It has no real impact"],
                correct: 1,
                explanation: "AI has real applications that affect how we live and work."
            },
            {
                axis: 'innovation',
                text: "Which word means 'the practical application of knowledge'?",
                options: ["Theory", "Technology", "Theology", "Terminology"],
                correct: 1,
                explanation: "'Technology' is the practical use of scientific discoveries."
            },
            {
                axis: 'innovation',
                text: "What ethical concern surrounds AI?",
                context: "Questions about privacy, bias, and control.",
                options: ["It's too slow", "Responsibility and bias in decision-making", "It costs too much", "Nobody uses it"],
                correct: 1,
                explanation: "Ethical concerns include algorithmic bias, privacy, and who controls AI systems."
            },
            {
                axis: 'innovation',
                text: "Renewable energy innovation is important because...",
                options: ["Coal is cheaper", "We need sustainable alternatives to fossil fuels", "It doesn't work", "Oil will never end"],
                correct: 1,
                explanation: "Renewable energy is crucial for sustainability and fighting climate change."
            },
            {
                axis: 'spaces',
                text: "Urban spaces have changed due to...",
                context: "Cities are growing and transforming.",
                options: ["Nothing", "Technology and population growth", "Less development", "Fewer people"],
                correct: 1,
                explanation: "Urbanization results from population growth and technological development."
            },
            {
                axis: 'art',
                text: "Street art is considered powerful because...",
                options: ["It costs nothing", "It makes public statements about society", "It's legal", "Anyone can do it"],
                correct: 1,
                explanation: "Street art brings messages to public spaces, challenging conventional views."
            },
            {
                axis: 'identities',
                text: "What is the relationship between language and identity?",
                context: "Language is how we express who we are.",
                options: ["None at all", "Language shapes how we see ourselves and culture", "Language is irrelevant", "Everyone speaks the same"],
                correct: 1,
                explanation: "Language is central to cultural identity and how we express belonging."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswer = null;
        let currentAxis = 'identities';
        const startTime = new Date();

        function shuffleQuestions() {
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            currentAxis = q.axis;
            document.getElementById('axis-label').textContent = `Axis: ${axisNames[q.axis]}`;
            document.getElementById('question-text').textContent = q.text;

            if (q.context) {
                document.getElementById('context').textContent = q.context;
                document.getElementById('context').style.display = 'block';
            } else {
                document.getElementById('context').style.display = 'none';
            }

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const label = document.createElement('div');
                label.className = 'option';
                label.textContent = opt;
                label.onclick = () => selectOption(idx);
                optionsDiv.appendChild(label);
            });

            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
            selectedAnswer = null;
        }

        function selectOption(idx) {
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
            selectedAnswer = idx;
        }

        function submitAnswer() {
            if (selectedAnswer === null) return;

            const q = questions[currentQuestion];
            const isCorrect = selectedAnswer === q.correct;
            if (isCorrect) score++;

            const options = document.querySelectorAll('.option');
            options[q.correct].classList.add('correct');
            if (!isCorrect) options[selectedAnswer].classList.add('incorrect');

            const feedback = document.getElementById('feedback');
            feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');
            feedback.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong><div class="explanation">${q.explanation}</div>`;

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < 20) {
                document.getElementById('current').textContent = currentQuestion + 1;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('results').classList.add('show');

            const pct = Math.round((score / 20) * 100);
            let stars = '';
            if (pct >= 90) stars = '⭐⭐⭐⭐⭐';
            else if (pct >= 80) stars = '⭐⭐⭐⭐';
            else if (pct >= 70) stars = '⭐⭐⭐';
            else if (pct >= 60) stars = '⭐⭐';
            else stars = '⭐';

            const endTime = new Date();
            const timeSpent = Math.floor((endTime - startTime) / 1000);

            const resultData = {
                v: 't_angl',
                dt: new Date().toISOString(),
                axis: currentAxis,
                score: `${score}/20`,
                pct: pct,
                stars: stars.length / 2,
                time: timeSpent
            };

            const resultCode = btoa(unescape(encodeURIComponent(JSON.stringify(resultData))));

            document.getElementById('final-score').textContent = `${score} / 20`;
            document.getElementById('stars').textContent = stars;
            document.getElementById('message').textContent =
                pct >= 80 ? '🎉 Excellent work!' :
                pct >= 60 ? '👍 Good effort!' :
                '💪 Keep practicing!';
            document.getElementById('result-code').textContent = resultCode;
        }

        shuffleQuestions();
        loadQuestion();
    </script>
</body>
</html>
