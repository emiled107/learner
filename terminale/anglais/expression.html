<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac English - Terminale</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #08090f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #1a1f3a 0%, #16213e 100%);
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #ff006e, #00d4ff) 1;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.2);
        }
        h1 {
            background: linear-gradient(135deg, #ff006e, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .cat-label {
            display: inline-block;
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .axis-label {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 15px;
            margin-left: 5px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff006e, #00d4ff);
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-text {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 20px;
        }
        .streak-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #ffd700;
        }
        .streak-bar .fire { font-size: 18px; }
        .question {
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid #ff006e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-type {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00d4ff;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .question-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ff006e;
            line-height: 1.5;
        }
        .context {
            background: rgba(0, 212, 255, 0.1);
            padding: 12px;
            margin: 10px 0 15px;
            border-radius: 5px;
            font-size: 14px;
            line-height: 1.6;
            color: #b0d0ff;
            font-style: italic;
        }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 6px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            font-size: 14px;
            line-height: 1.4;
        }
        .option:hover { border-color: #ff006e; background: rgba(255, 0, 110, 0.1); }
        .option.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.3); }
        .option.correct { border-color: #00ff00; background: rgba(0, 255, 0, 0.15); }
        .option.incorrect { border-color: #ff0000; background: rgba(255, 0, 0, 0.15); }
        .feedback { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: rgba(0, 255, 0, 0.1); border-left: 4px solid #00ff00; color: #90ff90; }
        .feedback.incorrect { background: rgba(255, 100, 100, 0.1); border-left: 4px solid #ff6464; color: #ff9999; }
        .explanation { margin-top: 10px; font-size: 13px; line-height: 1.6; color: #c0c0c0; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 12px; border: none; border-radius: 6px;
            font-weight: 600; cursor: pointer; font-size: 14px;
            transition: all 0.3s ease; font-family: 'Nunito', sans-serif;
        }
        .btn-submit { background: linear-gradient(135deg, #ff006e, #00d4ff); color: #fff; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(255, 0, 110, 0.4); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-next { background: rgba(255, 0, 110, 0.2); color: #ff006e; border: 2px solid #ff006e; }
        .btn-next:hover { background: rgba(255, 0, 110, 0.3); }
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .score-display {
            font-size: 48px; font-weight: 800;
            background: linear-gradient(135deg, #ff006e, #00d4ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin: 20px 0;
        }
        .stars { font-size: 40px; margin: 20px 0; letter-spacing: 10px; }
        .cat-breakdown {
            text-align: left; margin: 20px 0;
            background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px;
        }
        .cat-breakdown h3 { font-size: 14px; color: #00d4ff; margin-bottom: 10px; }
        .cat-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
        }
        .cat-row:last-child { border-bottom: none; }
        .cat-score { color: #ff006e; font-weight: 700; }
        .result-code {
            background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 11px; margin-top: 20px;
            word-break: break-all; color: #ff006e; cursor: pointer; position: relative;
        }
        .result-code:hover::after {
            content: 'Cliquer pour copier'; position: absolute; top: -25px; right: 0;
            font-size: 11px; color: #00d4ff; font-family: 'Nunito', sans-serif;
        }
        .back-link {
            display: inline-block; margin-top: 20px; color: #ff006e;
            text-decoration: none; font-weight: 600; transition: all 0.3s ease;
        }
        .back-link:hover { color: #00d4ff; text-decoration: underline; }
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 22px; }
            .question { padding: 15px; }
            .score-display { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇬🇧 Bac English - Terminale</h1>
        <div>
            <span class="cat-label" id="cat-label">Grammar</span>
            <span class="axis-label" id="axis-label">Identities & Exchanges</span>
        </div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:5%"></div></div>
        <div class="progress-text">Question <span id="current">1</span> / 25</div>
        <div class="streak-bar" id="streak-bar" style="display:none;">
            <span class="fire">🔥</span> <span id="streak-count">0</span> correct in a row!
        </div>

        <div id="quiz-content">
            <div class="question">
                <div class="question-type" id="question-type"></div>
                <div class="question-text" id="question-text"></div>
                <div class="context" id="context" style="display:none;"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
            </div>
            <div class="button-group">
                <button class="btn-submit" id="submit-btn" onclick="submitAnswer()" disabled>Validate</button>
                <button class="btn-next" id="next-btn" onclick="nextQuestion()" style="display:none;">Next →</button>
            </div>
        </div>

        <div id="results" class="results">
            <h2>✨ Final Results</h2>
            <div class="score-display" id="final-score"></div>
            <div class="stars" id="stars"></div>
            <p id="message" style="font-size:16px;margin-bottom:10px;"></p>
            <div class="cat-breakdown" id="cat-breakdown">
                <h3>📊 Score by Category</h3>
            </div>
            <p style="font-size:13px;color:#888;margin-top:15px;">📋 Copy your result code to track progress:</p>
            <div class="result-code" id="result-code" onclick="copyCode()"></div>
            <p id="copy-msg" style="color:#00ff88;font-size:12px;margin-top:5px;display:none;">✓ Copied!</p>
            <a href="/learner/index.html" class="back-link">← Back to home</a>
        </div>
    </div>

    <script>
    const TOTAL = 25;
    const axisNames = {
        'identities': 'Identities & Exchanges',
        'spaces': 'Private & Public Spaces',
        'art': 'Art & Power',
        'innovation': 'Innovations'
    };
    const catNames = {
        'tenses': 'Tenses & Conjugation',
        'grammar': 'Grammar & Structure',
        'vocabulary': 'Vocabulary',
        'irregular': 'Irregular Verbs & Phrasal Verbs',
        'comprehension': 'Comprehension & Culture',
        'expression': 'Written Expression'
    };

    const allQuestions = [

    // ============================================================
    //  TENSES & CONJUGATION (~15 questions)
    // ============================================================
    {
        cat:'tenses', axis:'identities', type:'Present Perfect vs Past Simple',
        text:"'I _____ in London for three years.' (still living there)",
        options:["lived","have lived","was living","had lived"],
        correct:1,
        explanation:"Present perfect ('have lived') because the action started in the past and continues now. Past simple ('lived') would mean you no longer live there."
    },
    {
        cat:'tenses', axis:'innovation', type:'Future Perfect',
        text:"'By 2050, scientists _____ a cure for most cancers.'",
        options:["will find","are finding","will have found","found"],
        correct:2,
        explanation:"Future perfect (will have + past participle) expresses an action completed before a specific future point. 'By 2050' signals completion before that date."
    },
    {
        cat:'tenses', axis:'spaces', type:'Past Continuous',
        text:"'While the police _____ the building, the suspect escaped.'",
        options:["searched","were searching","have searched","had been searching"],
        correct:1,
        explanation:"Past continuous ('were searching') for an ongoing past action interrupted by another event ('escaped' — past simple)."
    },
    {
        cat:'tenses', axis:'art', type:'Present Simple vs Continuous',
        text:"'She _____ a new painting every weekend.' (habit)",
        options:["is painting","paints","has painted","was painting"],
        correct:1,
        explanation:"Present simple for habits and routines. 'Is painting' would mean right now; 'has painted' implies result, not routine."
    },
    {
        cat:'tenses', axis:'identities', type:'Past Perfect',
        text:"'When they arrived at the airport, the plane _____.'",
        options:["already left","has already left","had already left","was already leaving"],
        correct:2,
        explanation:"Past perfect ('had left') for an action completed before another past action ('arrived'). It establishes the sequence of events."
    },
    {
        cat:'tenses', axis:'innovation', type:'Present Perfect Continuous',
        text:"'Researchers _____ on this project for ten years now.'",
        options:["work","worked","have been working","are working"],
        correct:2,
        explanation:"Present perfect continuous ('have been working') for an action that started in the past and is still ongoing, emphasising duration ('for ten years')."
    },
    {
        cat:'tenses', axis:'spaces', type:'Future: will vs going to',
        text:"'Look at those dark clouds! It _____ rain.'",
        options:["will","is going to","shall","is about"],
        correct:1,
        explanation:"'Going to' for predictions based on present evidence (dark clouds visible now). 'Will' is for spontaneous decisions or predictions without evidence."
    },
    {
        cat:'tenses', axis:'art', type:'Third Conditional',
        text:"'If Picasso _____ born in the 21st century, he might have been a digital artist.'",
        options:["was","had been","would be","has been"],
        correct:1,
        explanation:"Third conditional: If + past perfect ('had been'), would/might have + past participle. Expresses an unreal past situation."
    },
    {
        cat:'tenses', axis:'identities', type:'Second Conditional',
        text:"'If I _____ fluent in English, I would apply for that job in London.'",
        options:["am","was/were","would be","have been"],
        correct:1,
        explanation:"Second conditional: If + past simple ('were'), would + base form. Expresses an unreal present situation. 'Were' is formally preferred for all subjects."
    },
    {
        cat:'tenses', axis:'innovation', type:'Mixed Tenses',
        text:"'She told me she _____ the new software the day before.'",
        options:["installs","installed","had installed","has installed"],
        correct:2,
        explanation:"In reported speech, past simple becomes past perfect. 'The day before' confirms the backshift. Direct: 'I installed it yesterday.'"
    },
    {
        cat:'tenses', axis:'spaces', type:'Used to / Would',
        text:"'People _____ write letters; now everyone sends emails.'",
        options:["used to","would","use to","were used to"],
        correct:0,
        explanation:"'Used to' for past states or habits that are no longer true. 'Would' works for repeated past actions but NOT for past states. 'Were used to' means 'were accustomed to'."
    },
    {
        cat:'tenses', axis:'art', type:'Wish + Past',
        text:"'I wish I _____ more time to visit museums.' (present regret)",
        options:["have","had","would have","am having"],
        correct:1,
        explanation:"'Wish + past simple' expresses a present regret or desire for something different now. 'I wish I had' = I don't have but I want to."
    },
    {
        cat:'tenses', axis:'identities', type:'Since vs For',
        text:"'They have been friends _____ childhood.'",
        options:["for","since","during","from"],
        correct:1,
        explanation:"'Since' is used with a point in time (childhood, 2010, Monday). 'For' is used with a duration (three years, a long time, ages)."
    },
    {
        cat:'tenses', axis:'innovation', type:'Zero Conditional',
        text:"'If you _____ water to 100°C, it boils.'",
        options:["will heat","heat","heated","would heat"],
        correct:1,
        explanation:"Zero conditional (If + present simple, present simple) for scientific facts and general truths. No 'will' in either clause."
    },
    {
        cat:'tenses', axis:'spaces', type:'Future Continuous',
        text:"'This time tomorrow, I _____ my geography exam.'",
        options:["take","will take","will be taking","am taking"],
        correct:2,
        explanation:"Future continuous ('will be + -ing') for an action that will be in progress at a specific future time. 'This time tomorrow' is the key marker."
    },

    // ============================================================
    //  GRAMMAR & STRUCTURE (~12 questions)
    // ============================================================
    {
        cat:'grammar', axis:'spaces', type:'Passive Voice',
        text:"Rewrite in the passive: 'They are building new surveillance cameras everywhere.'",
        options:[
            "New surveillance cameras are being built everywhere.",
            "New surveillance cameras have been built everywhere.",
            "New surveillance cameras were built everywhere.",
            "New surveillance cameras are built everywhere."
        ],
        correct:0,
        explanation:"Present continuous passive: am/is/are + being + past participle. Keeps the ongoing nature of the original."
    },
    {
        cat:'grammar', axis:'art', type:'Reported Speech',
        text:"He said: 'Art can change the world.' → He said that art _____ the world.",
        options:["can change","could change","changes","will change"],
        correct:1,
        explanation:"Reported speech backshift: 'can' → 'could'. The tense shifts one step into the past."
    },
    {
        cat:'grammar', axis:'innovation', type:'Relative Clauses',
        text:"'The app _____ was released last month has 10 million downloads.'",
        options:["who","which","whom","whose"],
        correct:1,
        explanation:"'Which' for things (the app). 'Who' = people (subject), 'whom' = people (object), 'whose' = possession."
    },
    {
        cat:'grammar', axis:'identities', type:'Modals',
        text:"'You _____ speak to people like that! It's very rude.'",
        options:["mustn't","don't have to","needn't","shouldn't have"],
        correct:0,
        explanation:"'Mustn't' = prohibition (it's forbidden/wrong). 'Don't have to' = no obligation. 'Needn't' = not necessary. 'Shouldn't have' = past regret."
    },
    {
        cat:'grammar', axis:'spaces', type:'Modals of Deduction',
        text:"'He's been studying all night. He _____ be exhausted.'",
        options:["can","must","might","should"],
        correct:1,
        explanation:"'Must be' for strong deduction based on evidence (studied all night → almost certainly tired). 'Might' = less certain. 'Can' isn't used for specific deductions."
    },
    {
        cat:'grammar', axis:'art', type:'Comparatives & Superlatives',
        text:"'This painting is _____ than the previous one.'",
        options:["more impressive","impressiver","most impressive","the more impressive"],
        correct:0,
        explanation:"For adjectives of 3+ syllables: more + adjective. 'Impressiver' doesn't exist. 'Most impressive' = superlative (3+)."
    },
    {
        cat:'grammar', axis:'innovation', type:'Question Tags',
        text:"'Artificial intelligence will change our lives, _____?'",
        options:["will it","won't it","isn't it","doesn't it"],
        correct:1,
        explanation:"Positive statement → negative tag. 'Will change' → 'won't it?' The auxiliary must match the main clause."
    },
    {
        cat:'grammar', axis:'identities', type:'Prepositions',
        text:"'She's very good _____ languages.'",
        options:["in","at","on","with"],
        correct:1,
        explanation:"'Good at' is a fixed collocation. Other common ones: interested IN, keen ON, worried ABOUT, famous FOR."
    },
    {
        cat:'grammar', axis:'spaces', type:'Prepositions',
        text:"'I'm not used _____ working from home yet.'",
        options:["at","for","to","with"],
        correct:2,
        explanation:"'Used to + verb-ing' = accustomed to. Don't confuse with 'used to + base form' (past habit). The preposition 'to' takes a gerund here."
    },
    {
        cat:'grammar', axis:'art', type:'Articles',
        text:"'_____ art has the power to transform society.'",
        options:["The","A","An","∅ (no article)"],
        correct:3,
        explanation:"No article before uncountable/abstract nouns used in a general sense. 'Art' in general = no article. 'The art of painting' = specific."
    },
    {
        cat:'grammar', axis:'innovation', type:'Countable / Uncountable',
        text:"'Could you give me some _____?'",
        options:["advices","advice","an advice","advise"],
        correct:1,
        explanation:"'Advice' is uncountable in English (no plural, no 'a/an'). Use 'a piece of advice' for one item. 'Advise' is the verb."
    },
    {
        cat:'grammar', axis:'identities', type:'Subject-Verb Agreement',
        text:"'Neither the teacher nor the students _____ happy with the results.'",
        options:["is","was","were","has been"],
        correct:2,
        explanation:"With 'neither…nor', the verb agrees with the nearest subject ('students' = plural → 'were'). This is called the proximity rule."
    },

    // ============================================================
    //  IRREGULAR VERBS & PHRASAL VERBS (~10 questions)
    // ============================================================
    {
        cat:'irregular', axis:'identities', type:'Irregular Verbs',
        text:"What is the past participle of 'to forbid'?",
        options:["forbade","forbidden","forbid","forbidded"],
        correct:1,
        explanation:"Forbid – forbade – forbidden. An irregular verb meaning to ban or prohibit."
    },
    {
        cat:'irregular', axis:'art', type:'Irregular Verbs',
        text:"'The painting was _____ by an unknown artist.' (to steal)",
        options:["stealed","stole","stolen","stealing"],
        correct:2,
        explanation:"Steal – stole – stolen. In the passive voice, we need the past participle: 'was stolen'."
    },
    {
        cat:'irregular', axis:'innovation', type:'Irregular Verbs',
        text:"'Scientists have _____ new evidence of climate change.' (to find)",
        options:["finded","found","founded","finding"],
        correct:1,
        explanation:"Find – found – found. Don't confuse with 'founded' (past of 'to found' = to establish/create)."
    },
    {
        cat:'irregular', axis:'spaces', type:'Irregular Verbs',
        text:"Complete: 'She had _____ the letter before he arrived.' (to write)",
        options:["wrote","writed","written","writing"],
        correct:2,
        explanation:"Write – wrote – written. Past perfect requires the past participle: 'had written'."
    },
    {
        cat:'irregular', axis:'identities', type:'Irregular Verbs',
        text:"'The news _____ as a shock to everyone.' (to come)",
        options:["comed","came","come","has come"],
        correct:1,
        explanation:"Come – came – come. Past simple = 'came'. Note the past participle is the same as the base form."
    },
    {
        cat:'irregular', axis:'art', type:'Phrasal Verbs',
        text:"'The concert was called _____ due to bad weather.' (= cancelled)",
        options:["out","off","up","away"],
        correct:1,
        explanation:"'Call off' = cancel. Other useful ones: put off = postpone, carry out = execute, give up = stop trying."
    },
    {
        cat:'irregular', axis:'innovation', type:'Phrasal Verbs',
        text:"'We need to come _____ with a solution quickly.' (= find/invent)",
        options:["out","along","up","through"],
        correct:2,
        explanation:"'Come up with' = think of, invent, find (a solution/idea). Very common in both spoken and written English."
    },
    {
        cat:'irregular', axis:'spaces', type:'Phrasal Verbs',
        text:"'The government is looking _____ the matter.' (= investigating)",
        options:["at","up","into","for"],
        correct:2,
        explanation:"'Look into' = investigate, examine. 'Look at' = simply watch. 'Look up' = search for info. 'Look for' = try to find."
    },
    {
        cat:'irregular', axis:'identities', type:'Phrasal Verbs',
        text:"'She grew _____ in a bilingual family.' (= was raised)",
        options:["out","off","up","over"],
        correct:2,
        explanation:"'Grow up' = be raised, spend one's childhood. 'Grow out of' = become too big/mature for something."
    },
    {
        cat:'irregular', axis:'innovation', type:'Irregular Verbs',
        text:"'The cost of living has _____ dramatically.' (to rise)",
        options:["raised","rose","risen","rised"],
        correct:2,
        explanation:"Rise – rose – risen (intransitive: no object). Don't confuse with 'raise – raised – raised' (transitive: raise something)."
    },

    // ============================================================
    //  VOCABULARY (~12 questions)
    // ============================================================
    {
        cat:'vocabulary', axis:'identities', type:'Vocabulary',
        text:"What does 'a sense of belonging' mean?",
        options:["Feeling rejected","Owning property abroad","Feeling accepted and part of a group","Legally obtaining citizenship"],
        correct:2,
        explanation:"'A sense of belonging' is the feeling of being accepted, valued, and included within a community. Central to the Identities axis."
    },
    {
        cat:'vocabulary', axis:'spaces', type:'Vocabulary',
        text:"'To infringe on someone's privacy' means:",
        options:["To protect personal data","To improve living conditions","To violate someone's right to privacy","To share a social media post"],
        correct:2,
        explanation:"'To infringe on' = to violate, encroach upon. A formal expression used in essays about surveillance and civil liberties."
    },
    {
        cat:'vocabulary', axis:'art', type:'Vocabulary',
        text:"A 'dystopia' is:",
        options:["A perfect ideal society","A period of artistic achievement","A society marked by oppression and injustice","An architectural style"],
        correct:2,
        explanation:"A dystopia is the opposite of a utopia. Examples in fiction: 1984, Brave New World, The Handmaid's Tale."
    },
    {
        cat:'vocabulary', axis:'innovation', type:'Vocabulary',
        text:"'Disruptive technology' means:",
        options:["Technology that breaks down often","Tech too expensive for consumers","Innovation that radically changes industries","Software to block the internet"],
        correct:2,
        explanation:"Disruptive technology creates new markets or transforms existing ones (smartphones, streaming, electric cars)."
    },
    {
        cat:'vocabulary', axis:'identities', type:'False Friends',
        text:"The English word 'actually' means:",
        options:["Actuellement (currently)","En fait / réellement","En action","De manière actuelle"],
        correct:1,
        explanation:"'Actually' = en fait, réellement. 'Currently' = actuellement. Classic false friend between French and English!"
    },
    {
        cat:'vocabulary', axis:'spaces', type:'False Friends',
        text:"'Eventually' means:",
        options:["Éventuellement (possibly)","Finalement (in the end)","Évidemment","Parfois"],
        correct:1,
        explanation:"'Eventually' = finalement, en fin de compte. 'Possibly' = éventuellement. Another very common false friend."
    },
    {
        cat:'vocabulary', axis:'art', type:'Vocabulary',
        text:"'Propaganda' refers to:",
        options:["Neutral journalism","Academic research","Entertainment for profit","Biased information to promote a political cause"],
        correct:3,
        explanation:"Propaganda = deliberately biased material to promote a political agenda. Used in wars, dictatorships, and political campaigns."
    },
    {
        cat:'vocabulary', axis:'innovation', type:'Vocabulary',
        text:"'A whistleblower' is:",
        options:["A musician","A sports referee","A company spokesperson","Someone who exposes wrongdoing in an organisation"],
        correct:3,
        explanation:"A whistleblower reveals illegal or unethical practices. Famous examples: Edward Snowden, Frances Haugen."
    },
    {
        cat:'vocabulary', axis:'identities', type:'Vocabulary',
        text:"Which word means 'prejudice against people from other countries'?",
        options:["Patriotism","Xenophobia","Nostalgia","Empathy"],
        correct:1,
        explanation:"Xenophobia = fear or hatred of foreigners/strangers. From Greek 'xenos' (stranger) + 'phobos' (fear). Key term for the Identities axis."
    },
    {
        cat:'vocabulary', axis:'spaces', type:'Vocabulary',
        text:"'Gentrification' means:",
        options:["Renovation of areas displacing poorer residents","Decline of city centres","Government social housing","Rural migration"],
        correct:0,
        explanation:"Gentrification = wealthier people move in, raising costs, displacing original residents. A key concept for the Spaces axis."
    },
    {
        cat:'vocabulary', axis:'art', type:'Synonyms',
        text:"Choose the synonym of 'to convey' (a message):",
        options:["To hide","To transport physically","To communicate / express","To destroy"],
        correct:2,
        explanation:"'To convey' = to communicate, express, make known. 'The artist conveys a powerful message through colour.'"
    },
    {
        cat:'vocabulary', axis:'innovation', type:'Vocabulary',
        text:"'The digital divide' refers to:",
        options:["The gap between those with and without access to technology","Analogue vs digital TV","A computer virus","Hardware vs software companies"],
        correct:0,
        explanation:"The digital divide = inequality in access to computers, internet, and digital skills. Often linked to socioeconomic factors."
    },

    // ============================================================
    //  COMPREHENSION & CULTURE (~8 questions)
    // ============================================================
    {
        cat:'comprehension', axis:'identities', type:'Culture',
        text:"The 'Windrush generation' refers to:",
        options:["Irish famine refugees (1840s)","Caribbean migrants to UK from 1948","Indian workers in South Africa","European WWI refugees"],
        correct:1,
        explanation:"Named after the ship HMT Empire Windrush. Caribbean people who migrated to Britain (1948–1971) to fill post-war labour shortages."
    },
    {
        cat:'comprehension', axis:'identities', type:'Comprehension',
        text:"The 'melting pot' metaphor implies:",
        options:["Cultures coexist separately","Cultures blend into one identity","One culture absorbs all others","Traditions are preserved unchanged"],
        correct:1,
        explanation:"Melting pot = cultures merge into a new identity. Contrasts with 'salad bowl' (each culture stays distinct)."
    },
    {
        cat:'comprehension', axis:'spaces', type:'Culture',
        text:"Orwell's '1984' primarily explores:",
        options:["Benefits of technology","Mass surveillance and loss of privacy","International peace","Democracy's triumph"],
        correct:1,
        explanation:"'1984' depicts a society under total government surveillance ('Big Brother'), where privacy and individual freedom are destroyed."
    },
    {
        cat:'comprehension', axis:'spaces', type:'Culture',
        text:"Edward Snowden's 2013 revelations concerned:",
        options:["Corporate tax avoidance","Environmental damage","Mass government surveillance of citizens","Social media censorship"],
        correct:2,
        explanation:"Snowden revealed NSA mass surveillance programmes (PRISM) collecting data on citizens and foreign allies."
    },
    {
        cat:'comprehension', axis:'art', type:'Culture',
        text:"Picasso's 'Guernica' (1937) depicts:",
        options:["Beautiful Spanish landscapes","Glorification of war","The horror of bombing a Basque town","A self-portrait in exile"],
        correct:2,
        explanation:"Guernica was Picasso's response to Nazi bombing of the Basque town. The distorted monochrome figures convey war's horror."
    },
    {
        cat:'comprehension', axis:'art', type:'Culture',
        text:"Banksy is primarily known for:",
        options:["Classical museum paintings","Commercial advertising","Satirical social/political street art","Restoring old artworks"],
        correct:2,
        explanation:"Banksy uses anonymous street art for social/political protest: war, capitalism, consumerism, surveillance."
    },
    {
        cat:'comprehension', axis:'innovation', type:'Comprehension',
        text:"'Planned obsolescence' means:",
        options:["Making products last forever","Recycling e-waste","Designing products to break/become outdated intentionally","Government safety regulations"],
        correct:2,
        explanation:"Products deliberately designed with a limited lifespan to force consumers to buy replacements. An ethical issue in the Innovation axis."
    },
    {
        cat:'comprehension', axis:'art', type:'Culture',
        text:"The Harlem Renaissance (1920s–1930s) was:",
        options:["Revival of European classical art","A New York political party","A flourishing of African American art, music, and literature","A digital art movement"],
        correct:2,
        explanation:"Centred in Harlem, NYC. Key figures: Langston Hughes (poetry), Duke Ellington and Louis Armstrong (jazz), Zora Neale Hurston (literature)."
    },

    // ============================================================
    //  WRITTEN EXPRESSION (~8 questions)
    // ============================================================
    {
        cat:'expression', axis:'identities', type:'Linking Words',
        text:"Which phrase best introduces a concession?",
        options:["As a result,","In addition,","Admittedly, … however,","For instance,"],
        correct:2,
        explanation:"'Admittedly… however' acknowledges the opposing view then counters it. Essential for Bac essay balance."
    },
    {
        cat:'expression', axis:'spaces', type:'Thesis Statements',
        text:"Which is the strongest thesis statement?",
        options:[
            "Social media is popular among teenagers.",
            "While social media offers connectivity, it challenges our right to privacy by monetising personal data.",
            "I think social media can be bad sometimes.",
            "Many people use social media every day."
        ],
        correct:1,
        explanation:"A strong thesis has a concession + a clear claim + reasoning. It gives the essay direction and shows critical thinking."
    },
    {
        cat:'expression', axis:'art', type:'Essay Structure',
        text:"Which approach shows the most critical thinking in an essay on censorship?",
        options:[
            "Listing every banned book in history",
            "Saying censorship is always wrong",
            "Weighing both sides with examples, then reaching a balanced conclusion",
            "Copying a dictionary definition"
        ],
        correct:2,
        explanation:"Bac-level essays require multiple perspectives, evidence, and a nuanced conclusion — not just listing or asserting."
    },
    {
        cat:'expression', axis:'identities', type:'Introduction Techniques',
        text:"What's the most effective way to begin a Bac essay?",
        options:[
            "'Since the beginning of time…'",
            "A relevant quote, fact, or question leading to the thesis",
            "'In this essay I will talk about…'",
            "A dictionary definition of the key word"
        ],
        correct:1,
        explanation:"An engaging hook captures the reader's attention and flows naturally into the thesis. Generic openings are weak."
    },
    {
        cat:'expression', axis:'innovation', type:'Concluding Paragraphs',
        text:"Which best concludes a paragraph on AI and employment?",
        options:[
            "In conclusion, AI is a computer programme.",
            "Many people use AI at work now.",
            "While AI creates opportunities, societies must address job displacement through education reform.",
            "AI is interesting and will change things."
        ],
        correct:2,
        explanation:"An effective conclusion synthesises both sides and proposes solutions. It shows the analytical depth expected at Bac level."
    },
    {
        cat:'expression', axis:'spaces', type:'Linking Words',
        text:"'_____, surveillance can prevent crime. _____, it threatens civil liberties.'",
        options:[
            "Because / So",
            "On the one hand / On the other hand",
            "First / Next",
            "Although / Despite"
        ],
        correct:1,
        explanation:"'On the one hand… on the other hand' presents two contrasting arguments. Perfect for balanced essay paragraphs."
    },
    {
        cat:'expression', axis:'art', type:'Linking Words',
        text:"Choose the correct cause-effect connector: '_____ the painting was controversial, it attracted thousands of visitors.'",
        options:["Despite","Because","Although","However"],
        correct:1,
        explanation:"'Because' shows cause → effect (controversial → attracted visitors). 'Although/Despite' show contrast. 'However' starts a new sentence."
    },
    {
        cat:'expression', axis:'innovation', type:'Register',
        text:"Which sentence uses the most appropriate formal register for a Bac essay?",
        options:[
            "Tech stuff is gonna change everything real quick.",
            "Technological advancements are likely to have a significant impact on society.",
            "Tech will like totally transform our world.",
            "Technology is cool and changes lots of things."
        ],
        correct:1,
        explanation:"Formal register avoids slang ('gonna', 'stuff', 'cool'), contractions, and vague language. Use precise vocabulary and full forms."
    }
    ];

    // ---- Game state ----
    let questions = [];
    let currentQuestion = 0;
    let score = 0;
    let selectedAnswer = null;
    let streak = 0;
    let maxStreak = 0;
    const startTime = new Date();
    const catScores = {};
    Object.keys(catNames).forEach(k => { catScores[k] = {correct:0, total:0}; });

    function selectQuestions() {
        // Target: tenses 7, grammar 5, irregular 4, vocabulary 4, comprehension 3, expression 2 = 25
        const targets = {tenses:7, grammar:5, irregular:4, vocabulary:4, comprehension:3, expression:2};
        const byCat = {};
        allQuestions.forEach(q => {
            if (!byCat[q.cat]) byCat[q.cat] = [];
            byCat[q.cat].push(q);
        });
        Object.values(byCat).forEach(arr => {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        });
        const selected = [];
        Object.entries(targets).forEach(([cat, n]) => {
            if (byCat[cat]) selected.push(...byCat[cat].slice(0, n));
        });
        // Shuffle final
        for (let i = selected.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [selected[i], selected[j]] = [selected[j], selected[i]];
        }
        questions = selected.slice(0, TOTAL);
    }

    function loadQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('cat-label').textContent = catNames[q.cat] || q.cat;
        document.getElementById('axis-label').textContent = axisNames[q.axis] || q.axis;
        document.getElementById('question-type').textContent = q.type;
        document.getElementById('question-text').textContent = q.text;
        document.getElementById('progress-fill').style.width = ((currentQuestion + 1) / TOTAL * 100) + '%';

        if (q.context) {
            document.getElementById('context').textContent = q.context;
            document.getElementById('context').style.display = 'block';
        } else {
            document.getElementById('context').style.display = 'none';
        }

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const label = document.createElement('div');
            label.className = 'option';
            label.textContent = opt;
            label.onclick = () => selectOption(idx);
            optionsDiv.appendChild(label);
        });

        document.getElementById('feedback').innerHTML = '';
        document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
        selectedAnswer = null;
    }

    function selectOption(idx) {
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.toggle('selected', i === idx);
        });
        selectedAnswer = idx;
        document.getElementById('submit-btn').disabled = false;
    }

    function submitAnswer() {
        if (selectedAnswer === null) return;
        const q = questions[currentQuestion];
        const isCorrect = selectedAnswer === q.correct;

        catScores[q.cat].total++;
        if (isCorrect) {
            score++;
            streak++;
            if (streak > maxStreak) maxStreak = streak;
            catScores[q.cat].correct++;
        } else {
            streak = 0;
        }

        const streakBar = document.getElementById('streak-bar');
        if (streak >= 2) {
            streakBar.style.display = 'flex';
            document.getElementById('streak-count').textContent = streak;
        } else {
            streakBar.style.display = 'none';
        }

        const options = document.querySelectorAll('.option');
        options.forEach(o => { o.style.pointerEvents = 'none'; });
        options[q.correct].classList.add('correct');
        if (!isCorrect) options[selectedAnswer].classList.add('incorrect');

        const feedback = document.getElementById('feedback');
        feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');
        feedback.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong><div class="explanation">${q.explanation}</div>`;

        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < TOTAL) {
            document.getElementById('current').textContent = currentQuestion + 1;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('results').classList.add('show');

        const pct = Math.round((score / TOTAL) * 100);
        let starCount;
        if (pct >= 90) starCount = 5;
        else if (pct >= 75) starCount = 4;
        else if (pct >= 60) starCount = 3;
        else if (pct >= 40) starCount = 2;
        else starCount = 1;

        const endTime = new Date();
        const timeSpent = Math.floor((endTime - startTime) / 1000);

        // Category breakdown
        const breakdownDiv = document.getElementById('cat-breakdown');
        Object.entries(catNames).forEach(([key, name]) => {
            const data = catScores[key];
            if (data.total === 0) return;
            const row = document.createElement('div');
            row.className = 'cat-row';
            const cpct = Math.round((data.correct / data.total) * 100);
            row.innerHTML = `<span>${name}</span><span class="cat-score">${data.correct}/${data.total} (${cpct}%)</span>`;
            breakdownDiv.appendChild(row);
        });

        const resultData = {
            v: 't_angl',
            dt: new Date().toISOString(),
            score: `${score}/${TOTAL}`,
            pct: pct,
            stars: starCount,
            time: timeSpent,
            streak: maxStreak,
            cats: {}
        };
        Object.entries(catScores).forEach(([key, data]) => {
            if (data.total > 0) resultData.cats[key] = { c: data.correct, t: data.total };
        });

        const resultCode = btoa(unescape(encodeURIComponent(JSON.stringify(resultData))));

        document.getElementById('final-score').textContent = `${score} / ${TOTAL}`;
        document.getElementById('stars').textContent = '⭐'.repeat(starCount);
        document.getElementById('message').textContent =
            pct >= 85 ? "🎉 Outstanding! You're well prepared for the Bac!" :
            pct >= 70 ? '👏 Great job! Focus on weaker categories.' :
            pct >= 50 ? '👍 Decent effort. Revise grammar and irregular verbs.' :
            '💪 Keep practising! Start with tenses and irregular verbs.';
        document.getElementById('result-code').textContent = resultCode;
    }

    function copyCode() {
        const code = document.getElementById('result-code').textContent;
        navigator.clipboard.writeText(code).then(() => {
            const msg = document.getElementById('copy-msg');
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 2000);
        });
    }

    selectQuestions();
    loadQuestion();
    </script>
</body>
</html>
