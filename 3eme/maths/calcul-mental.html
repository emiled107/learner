<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcul Mental Chrono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090f;
            font-family: 'Nunito', sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            font-weight: 800;
        }

        .back-link {
            color: #64dfdf;
            text-decoration: none;
            font-weight: 700;
            padding: 8px 16px;
            border: 2px solid #64dfdf;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: #64dfdf;
            color: #08090f;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .level-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .level-btn {
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            text-align: center;
        }

        .level-btn:nth-child(1) { background: linear-gradient(135deg, #667eea, #764ba2); }
        .level-btn:nth-child(2) { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .level-btn:nth-child(3) { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .level-btn:nth-child(4) { background: linear-gradient(135deg, #fa709a, #fee140); }

        .level-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        .quiz-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            transition: width 0.3s;
        }

        .timer {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-height: 60px;
        }

        .question-num {
            font-size: 12px;
            color: #64dfdf;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 28px;
            font-weight: 800;
            margin: 30px 0;
            text-align: center;
            color: #fff;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 25px 0;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: #ff006e;
            background: rgba(255, 0, 110, 0.1);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #00d084, #00f2fe);
            border-color: #00d084;
            color: #08090f;
        }

        .option-btn.incorrect {
            background: linear-gradient(135deg, #ff006e, #f5576c);
            border-color: #ff006e;
            color: white;
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-box {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-label {
            font-size: 12px;
            color: #64dfdf;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .results {
            text-align: center;
            margin: 30px 0;
        }

        .score-display {
            font-size: 64px;
            font-weight: 800;
            margin: 20px 0;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stars {
            font-size: 40px;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        .percentage {
            font-size: 24px;
            color: #64dfdf;
            margin: 15px 0;
        }

        .result-code {
            background: rgba(100, 223, 223, 0.1);
            border: 2px solid #64dfdf;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #64dfdf;
            max-height: 200px;
            overflow-y: auto;
        }

        .button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            margin: 10px 5px;
            display: inline-block;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.4);
        }

        .button.secondary {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #08090f;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 22px;
            }

            .timer {
                font-size: 36px;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .level-select {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧮 Calcul Mental Chrono</h1>
            <a href="/learner/index.html" class="back-link">← Retour</a>
        </div>

        <!-- LEVEL SELECT SCREEN -->
        <div id="levelScreen" class="screen active">
            <div class="quiz-container">
                <h2 style="margin-bottom: 20px; text-align: center;">Choisissez votre niveau</h2>
                <div class="level-select">
                    <button class="level-btn" onclick="startQuiz(0)">
                        <strong>6ème</strong><br>
                        Fractions & Décimaux
                    </button>
                    <button class="level-btn" onclick="startQuiz(1)">
                        <strong>5ème</strong><br>
                        Fractions ± × Relatifs
                    </button>
                    <button class="level-btn" onclick="startQuiz(2)">
                        <strong>4ème</strong><br>
                        Puissances & Notation Sci.
                    </button>
                    <button class="level-btn" onclick="startQuiz(3)">
                        <strong>3ème</strong><br>
                        Racines & Mix Total
                    </button>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quizScreen" class="screen">
            <div class="quiz-container">
                <div class="question-num" id="questionNum"></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="timer" id="timer">25</div>

                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-label">Streak</div>
                        <div class="stat-value" id="streak">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Bonnes</div>
                        <div class="stat-value" id="correct">0/25</div>
                    </div>
                </div>

                <div class="question-text" id="questionText"></div>

                <div class="options" id="options"></div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="resultsScreen" class="screen">
            <div class="quiz-container results">
                <h2>Résultats</h2>
                <div class="score-display" id="finalScore"></div>
                <div class="percentage" id="finalPercentage"></div>
                <div class="stars" id="finalStars"></div>

                <div class="result-code" id="resultCode"></div>

                <button class="button" onclick="location.reload()">Rejouer</button>
                <button class="button secondary" onclick="showLevels()">Changer de niveau</button>
            </div>
        </div>
    </div>

    <script>
        const QUESTIONS = {
            0: [ // 6ème
                { q: "3/4 + 1/4 = ?", opts: ["1/2", "1", "7/8", "2"], ans: 1 },
                { q: "2.5 × 4 = ?", opts: ["8", "10", "12", "6.5"], ans: 1 },
                { q: "6/8 simplifié = ?", opts: ["2/3", "3/4", "1/2", "2/4"], ans: 1 },
                { q: "1/2 + 1/2 = ?", opts: ["1", "2", "1/4", "2/4"], ans: 0 },
                { q: "3/5 + 1/5 = ?", opts: ["2/5", "4/5", "2", "1"], ans: 1 },
                { q: "10 ÷ 4 = ?", opts: ["2", "2.5", "3", "1.5"], ans: 1 },
                { q: "0.5 + 0.3 = ?", opts: ["0.8", "0.7", "0.2", "1"], ans: 0 },
                { q: "5 × 0.2 = ?", opts: ["1", "10", "0.1", "25"], ans: 0 },
                { q: "4/6 simplifié = ?", opts: ["1/2", "2/3", "1/3", "3/4"], ans: 1 },
                { q: "2/3 + 1/3 = ?", opts: ["1", "2/6", "3/6", "1/3"], ans: 0 },
                { q: "1.5 × 2 = ?", opts: ["3", "2.5", "0.75", "1.5"], ans: 0 },
                { q: "3/4 - 1/4 = ?", opts: ["1/4", "1/2", "2/4", "1"], ans: 1 },
                { q: "0.25 × 4 = ?", opts: ["0.1", "0.5", "1", "2"], ans: 2 },
                { q: "8/10 simplifié = ?", opts: ["4/5", "2/5", "1/2", "3/5"], ans: 0 },
                { q: "1.2 + 0.8 = ?", opts: ["1.10", "1.12", "2", "1"], ans: 2 },
                { q: "3 ÷ 4 = ?", opts: ["0.75", "1.25", "0.5", "1"], ans: 0 },
                { q: "1/8 + 1/8 = ?", opts: ["1/16", "1/4", "2/8", "1/2"], ans: 1 },
                { q: "2.5 - 1.5 = ?", opts: ["1", "2", "0.5", "1.5"], ans: 0 },
                { q: "5/10 simplifié = ?", opts: ["1/2", "1/5", "2/5", "3/5"], ans: 0 },
                { q: "0.1 × 100 = ?", opts: ["1", "10", "100", "0.01"], ans: 0 }
            ],
            1: [ // 5ème
                { q: "2/3 + 3/4 = ?", opts: ["5/7", "17/12", "6/12", "1/2"], ans: 1 },
                { q: "-5 + 8 = ?", opts: ["3", "-13", "-3", "13"], ans: 0 },
                { q: "3/4 × 2/5 = ?", opts: ["6/20", "3/10", "2/20", "5/12"], ans: 0 },
                { q: "-3 - 2 = ?", opts: ["-5", "5", "-1", "1"], ans: 0 },
                { q: "1/2 + 1/3 = ?", opts: ["2/5", "5/6", "1/5", "1/6"], ans: 1 },
                { q: "-4 × 2 = ?", opts: ["-8", "8", "-2", "2"], ans: 0 },
                { q: "5/6 - 1/3 = ?", opts: ["4/3", "1/2", "1/3", "4/6"], ans: 1 },
                { q: "-10 ÷ 2 = ?", opts: ["-5", "5", "-20", "20"], ans: 0 },
                { q: "2/5 × 5/2 = ?", opts: ["1", "20/10", "4/5", "7/10"], ans: 0 },
                { q: "-7 + 3 = ?", opts: ["-4", "4", "-10", "10"], ans: 0 },
                { q: "3/8 + 1/4 = ?", opts: ["4/12", "5/8", "4/32", "1/2"], ans: 1 },
                { q: "-6 - (-2) = ?", opts: ["-4", "4", "-8", "8"], ans: 0 },
                { q: "1/3 × 3/2 = ?", opts: ["1/2", "3/6", "4/6", "3/5"], ans: 0 },
                { q: "-12 + 5 = ?", opts: ["-7", "7", "-17", "17"], ans: 0 },
                { q: "4/5 ÷ 2/5 = ?", opts: ["2", "8/25", "1/2", "1"], ans: 0 },
                { q: "-3 × (-4) = ?", opts: ["12", "-12", "-7", "1"], ans: 0 },
                { q: "2/7 + 3/7 = ?", opts: ["5/14", "5/7", "1/7", "6/14"], ans: 1 },
                { q: "-8 + (-2) = ?", opts: ["-10", "10", "-6", "6"], ans: 0 },
                { q: "3/4 × 4/3 = ?", opts: ["1", "12/12", "7/12", "7/7"], ans: 0 },
                { q: "-15 ÷ 3 = ?", opts: ["-5", "5", "-45", "45"], ans: 0 }
            ],
            2: [ // 4ème
                { q: "2³ = ?", opts: ["6", "8", "9", "5"], ans: 1 },
                { q: "10⁻² = ?", opts: ["0.01", "0.1", "100", "0.001"], ans: 0 },
                { q: "3.6 × 10⁴ en standard = ?", opts: ["36000", "360000", "3600", "0.00036"], ans: 0 },
                { q: "5² = ?", opts: ["10", "25", "7", "15"], ans: 1 },
                { q: "10³ = ?", opts: ["30", "100", "1000", "10"], ans: 2 },
                { q: "2⁵ = ?", opts: ["7", "10", "32", "16"], ans: 2 },
                { q: "1.5 × 10² = ?", opts: ["150", "15", "1500", "0.15"], ans: 0 },
                { q: "4² = ?", opts: ["8", "12", "16", "20"], ans: 2 },
                { q: "2⁴ = ?", opts: ["8", "16", "6", "32"], ans: 1 },
                { q: "10⁻¹ = ?", opts: ["0.1", "10", "0.01", "1"], ans: 0 },
                { q: "6² = ?", opts: ["12", "36", "18", "42"], ans: 1 },
                { q: "3⁴ = ?", opts: ["12", "27", "81", "64"], ans: 2 },
                { q: "2.5 × 10³ = ?", opts: ["2500", "250", "25000", "25"], ans: 0 },
                { q: "7² = ?", opts: ["14", "49", "21", "35"], ans: 1 },
                { q: "10⁰ = ?", opts: ["0", "1", "10", "100"], ans: 1 },
                { q: "3³ = ?", opts: ["9", "27", "6", "18"], ans: 1 },
                { q: "4 × 10² = ?", opts: ["400", "40", "4000", "4"], ans: 0 },
                { q: "8 × 10⁻¹ = ?", opts: ["0.8", "8", "80", "0.08"], ans: 0 },
                { q: "(-2)³ = ?", opts: ["8", "-8", "6", "-6"], ans: 1 },
                { q: "5 × 10³ = ?", opts: ["500", "5000", "50", "50000"], ans: 1 }
            ],
            3: [ // 3ème
                { q: "√49 = ?", opts: ["7", "24.5", "49", "98"], ans: 0 },
                { q: "√75 simplifié = ?", opts: ["5√3", "√25×3", "15√5", "√75"], ans: 0 },
                { q: "√16 = ?", opts: ["4", "8", "2", "16"], ans: 0 },
                { q: "√100 = ?", opts: ["10", "50", "100", "5"], ans: 0 },
                { q: "√64 = ?", opts: ["8", "4", "32", "2"], ans: 0 },
                { q: "2³ = ?", opts: ["6", "8", "9", "5"], ans: 1 },
                { q: "√144 = ?", opts: ["12", "72", "144", "6"], ans: 0 },
                { q: "√50 simplifié = ?", opts: ["5√2", "√25×2", "10√5", "2√5"], ans: 0 },
                { q: "3⁴ = ?", opts: ["12", "27", "81", "64"], ans: 2 },
                { q: "√36 = ?", opts: ["6", "18", "36", "12"], ans: 0 },
                { q: "2/3 + 3/4 = ?", opts: ["5/7", "17/12", "6/12", "1/2"], ans: 1 },
                { q: "√200 simplifié = ?", opts: ["10√2", "2√50", "20√5", "√100×2"], ans: 0 },
                { q: "-5 × (-3) = ?", opts: ["15", "-15", "-2", "2"], ans: 0 },
                { q: "10⁻² = ?", opts: ["0.01", "0.1", "100", "0.001"], ans: 0 },
                { q: "√121 = ?", opts: ["11", "121", "60.5", "22"], ans: 0 },
                { q: "(-3)² = ?", opts: ["-9", "9", "6", "-6"], ans: 1 },
                { q: "4/5 ÷ 2/5 = ?", opts: ["2", "8/25", "1/2", "4/5"], ans: 0 },
                { q: "√32 simplifié = ?", opts: ["4√2", "2√8", "√16×2", "8√2"], ans: 0 },
                { q: "2⁵ = ?", opts: ["10", "32", "16", "25"], ans: 1 },
                { q: "√81 = ?", opts: ["9", "40.5", "81", "18"], ans: 0 }
            ]
        };

        let currentLevel = 0;
        let currentQuestion = 0;
        let score = 0;
        let streak = 0;
        let timerInterval = null;
        let timeLeft = 0;
        let answered = false;
        let questionPool = [];

        function startQuiz(level) {
            currentLevel = level;
            currentQuestion = 0;
            score = 0;
            streak = 0;
            answered = false;
            questionPool = [...QUESTIONS[level]].sort(() => Math.random() - 0.5).slice(0, 25);

            showScreen('quizScreen');
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestion >= 25) {
                showResults();
                return;
            }

            answered = false;
            const q = questionPool[currentQuestion];

            document.getElementById('questionNum').textContent = `Question ${currentQuestion + 1} / 25`;
            document.getElementById('questionText').textContent = q.q;
            document.getElementById('progressFill').style.width = ((currentQuestion / 25) * 100) + '%';

            const opts = document.getElementById('options');
            opts.innerHTML = '';
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(idx);
                opts.appendChild(btn);
            });

            startTimer(25);
        }

        function startTimer(duration) {
            timeLeft = duration;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (!answered) {
                        answered = true;
                        streak = 0;
                        nextQuestion();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer').textContent = timeLeft;
        }

        function checkAnswer(idx) {
            if (answered) return;
            answered = true;
            clearInterval(timerInterval);

            const q = questionPool[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');

            if (idx === q.ans) {
                score++;
                streak++;
                buttons[idx].classList.add('correct');
            } else {
                streak = 0;
                buttons[idx].classList.add('incorrect');
                buttons[q.ans].classList.add('correct');
            }

            buttons.forEach(btn => btn.disabled = true);
            document.getElementById('correct').textContent = score + '/25';
            document.getElementById('streak').textContent = streak;

            setTimeout(nextQuestion, 1500);
        }

        function nextQuestion() {
            currentQuestion++;
            loadQuestion();
        }

        function showResults() {
            clearInterval(timerInterval);
            const pct = Math.round((score / 25) * 100);
            let stars = '⭐';
            if (pct >= 90) stars = '⭐⭐⭐';
            else if (pct >= 75) stars = '⭐⭐';
            else if (pct < 50) stars = '';

            const levels = ['6ème', '5ème', '4ème', '3ème'];
            const resultCode = btoa(JSON.stringify({
                v: 'c_calcul',
                dt: new Date().toISOString(),
                level: levels[currentLevel],
                score: score + '/25',
                pct: pct,
                stars: stars.length,
                streak: streak
            }));

            document.getElementById('finalScore').textContent = score + '/25';
            document.getElementById('finalPercentage').textContent = pct + '%';
            document.getElementById('finalStars').textContent = stars || '❌';
            document.getElementById('resultCode').textContent = resultCode;

            showScreen('resultsScreen');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showLevels() {
            showScreen('levelScreen');
        }
    </script>
</body>
</html>
