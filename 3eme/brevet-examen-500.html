{id:'pc',name:'Physique-Chimie',icon:'⚗️',color:'#54a0ff',cards:[
{id:'PC01',title:'Électricité : circuits',sub:'⚠️ Fiche renforcée — Loi d\'Ohm · Série · Parallèle',
content:`<h3>Grandeurs électriques</h3><ul><li><b>Tension U</b> (Volts) → voltmètre en <b>dérivation</b></li><li><b>Intensité I</b> (Ampères) → ampèremètre en <b>série</b></li><li><b>Résistance R</b> (Ohms Ω)</li></ul><h3>Loi d'Ohm</h3><p><b>U = R × I</b> → R = U/I → I = U/R</p><h3>Circuits en série</h3><ul><li>I identique partout : I₁ = I₂ = I</li><li>Tensions s'additionnent : U = U₁ + U₂</li><li>Résistances s'additionnent : Req = R₁ + R₂</li></ul><h3>Circuits en dérivation (parallèle)</h3><ul><li>Tension identique : U₁ = U₂ = U</li><li>Intensités s'additionnent : I = I₁ + I₂</li><li>1/Req = 1/R₁ + 1/R₂ (toujours inférieure à la plus petite R)</li></ul><h3>⚠️ Pièges fréquents</h3><ul><li>En parallèle : Req est PLUS PETITE que chaque résistance !</li><li>Voltmètre en dérivation = ne gêne pas le circuit</li><li>Ampèremètre en série = doit être traversé par le courant</li></ul><div class="memo">🧠 <b>Série :</b> I constant, U s'additionne. <b>Dérivation :</b> U constant, I s'additionne. Loi Ohm : U=RI. Voltmètre=dérivation. Ampèremètre=série.</div>`,
qcm:[
{q:'U=12V, R=4Ω → I = ?',opts:['3A','48A','0,33A','8A'],answer:0,exp:'I=U/R=12/4=3A'},
{q:'En circuit série, l\'intensité est ?',opts:['Différente pour chaque dipôle','La même partout','Nulle','Proportionnelle à la résistance'],answer:1,exp:'En série : I identique dans tous les dipôles'},
{q:'En circuit parallèle, la tension est ?',opts:['Différente pour chaque branche','La même pour toutes les branches','Nulle','La somme des tensions'],answer:1,exp:'En dérivation : U identique aux bornes de chaque branche'},
{q:'Pour mesurer une tension, on utilise ?',opts:['Ampèremètre en série','Voltmètre en dérivation','Ohmmètre en série','Multimètre en série'],answer:1,exp:'Voltmètre = en dérivation (parallèle) aux bornes de ce qu\'on mesure'},
{q:'R1=3Ω et R2=6Ω en dérivation → Req = ?',opts:['9Ω','2Ω','18Ω','0,5Ω'],answer:1,exp:'1/Req=1/3+1/6=2/6+1/6=3/6 → Req=2Ω. Plus petite que R1 et R2 !'},
{q:'R1=4Ω et R2=6Ω en série, U=20V → I = ?',opts:['2A','5A','3,3A','1,25A'],answer:0,exp:'Req=4+6=10Ω ; I=U/Req=20/10=2A'},
]},
{id:'PC02',title:'Forces et mouvement',sub:'Vecteur force · Poids · Newton · Énergie',
content:`<h3>La force — grandeur vectorielle</h3><ul><li>Caractérisée par : point d'application, direction, sens, valeur (Newtons, N)</li><li><b>Poids</b> : P = m × g (g=10 N/kg sur Terre ; 1,6 N/kg sur Lune)</li><li><b>Réaction du support (normale)</b> : perpendiculaire à la surface de contact</li></ul><h3>Lois de Newton</h3><ul><li><b>1ère (inertie)</b> : ΣF = 0 → repos ou MRU (mouvement rectiligne uniforme)</li><li><b>2ème</b> : ΣF = m × a (somme des forces = masse × accélération)</li><li><b>3ème (action-réaction)</b> : forces mutuelles égales et opposées</li></ul><h3>Travail et énergie</h3><ul><li>W = F × d × cos(θ) en Joules</li><li>Puissance P = E/t (Watts = J/s)</li></ul><div class="memo">🧠 P=mg. ΣF=0 → repos ou MRU. ΣF=ma. Action-réaction=égales et opposées. Poids≠masse (poids dépend de g).</div>`,
qcm:[
{q:'Poids d\'un objet de 5 kg sur Terre (g=10) ?',opts:['5N','50N','500N','0,5N'],answer:1,exp:'P=m×g=5×10=50N'},
{q:'Si ΣF = 0, l\'objet est ?',opts:['Forcément à l\'arrêt','En accélération','En repos ou MRU (1ère loi Newton)','En chute libre'],answer:2,exp:'ΣF=0 → repos ou mouvement rectiligne uniforme'},
{q:'ΣF = m × a : c\'est la ?',opts:['1ère loi de Newton','2ème loi de Newton','3ème loi de Newton','Loi d\'Ohm'],answer:1,exp:'2ème loi de Newton : la résultante des forces = masse × accélération'},
{q:'La 3ème loi de Newton dit que ?',opts:['Tout objet attire les autres','Les forces action-réaction sont égales et opposées','F=ma','Rien ne se crée'],answer:1,exp:'Si A exerce F sur B, B exerce −F (même norme, sens opposé) sur A'},
{q:'Poids sur la Lune d\'un objet de 10 kg (g=1,6 N/kg) ?',opts:['10N','16N','100N','6,25N'],answer:1,exp:'P=10×1,6=16N (masse=10kg partout, poids varie selon g)'},
{q:'Un objet en chute libre (sans frottement) a ?',opts:['ΣF=0','Une vitesse constante','Une accélération constante g','Une force nulle'],answer:2,exp:'En chute libre : seule la pesanteur agit → accélération constante = g (10 m/s² sur Terre)'},
]},
{id:'PC03',title:'Optique et lumière',sub:'Réflexion · Réfraction · Lentilles · Spectre',
content:`<h3>Propriétés de la lumière</h3><ul><li>Propagation rectiligne dans un milieu homogène</li><li>Vitesse dans le vide : <b>c = 3×10⁸ m/s</b></li><li>Lumière blanche = mélange de toutes les couleurs du spectre visible (ROYGBIV)</li></ul><h3>Réflexion</h3><p>Angle d'incidence = angle de réflexion (par rapport à la normale)</p><h3>Réfraction — loi de Snell-Descartes</h3><p>n₁ sin(i₁) = n₂ sin(i₂)<br>Milieu plus dense → rayon se <b>rapproche</b> de la normale</p><h3>Lentilles convergentes (f'>0)</h3><ul><li>Objet au-delà de 2f' → image réelle plus petite</li><li>Entre f' et 2f' → image réelle agrandie</li><li>Entre O et f' → image virtuelle agrandie (<b>loupe</b>)</li></ul><div class="memo">🧠 c=3×10⁸ m/s. Réflexion: i=r. Réfraction: milieu dense→rapproche normale. Loupe=objet entre O et f'. Prisme=décompose la lumière blanche.</div>`,
qcm:[
{q:'Vitesse de la lumière dans le vide ?',opts:['3×10⁶ m/s','3×10⁸ m/s','3×10¹⁰ m/s','300 m/s'],answer:1,exp:'c=3×10⁸ m/s (300 000 km/s)'},
{q:'Angle de réflexion = ?',opts:['0°','90°','Angle d\'incidence','2× angle incidence'],answer:2,exp:'Loi de la réflexion : i_réflexion = i_incidence'},
{q:'Un rayon passant de l\'air vers le verre (plus dense) ?',opts:['S\'éloigne de la normale','Se rapproche de la normale','Déviation nulle','Se réfléchit entièrement'],answer:1,exp:'Vers un milieu plus dense → rapprochement de la normale (réfraction)'},
{q:'Lumière blanche à travers un prisme donne ?',opts:['Lumière rouge uniquement','Lumière blanche amplifiée','Le spectre visible (arc-en-ciel)','Lumière UV'],answer:2,exp:'Le prisme décompose la lumière blanche en toutes ses couleurs (ROYGBIV)'},
{q:'Objet entre O et f\' d\'une lentille convergente ?',opts:['Image réelle plus petite','Image réelle agrandie','Image virtuelle agrandie (loupe)','Pas d\'image'],answer:2,exp:'Objet < f\' → image virtuelle, droite, agrandie → effet loupe'},
{q:'L\'indice de réfraction du verre est d\'environ 1,5. La lumière va ? dans le verre que dans l\'air.',opts:['Plus vite','Aussi vite','Plus lentement','2 fois plus vite'],answer:2,exp:'Dans un milieu d\'indice n, la vitesse de la lumière = c/n. n=1,5 → v=c/1,5 → plus lentement que dans l\'air (n=1)'},
]},
{id:'PC04',title:'Chimie : atomes, ions & molécules',sub:'⚠️ Fiche renforcée — structure atomique & liaisons',
content:`<h3>Structure de l'atome</h3><ul><li><b>Noyau</b> : protons (charge +) + neutrons (charge neutre)</li><li><b>Électrons</b> : charge −, organisés en couches autour du noyau</li><li><b>Z</b> (numéro atomique) = nombre de protons = nombre d'électrons (si atome neutre)</li><li><b>A</b> (nombre de masse) = protons + neutrons (= nucléons)</li><li>Notation : ᴬzX (ex : ¹²₆C = carbone avec 6 protons et 6 neutrons)</li></ul><h3>Ions — formation</h3><ul><li>Atome perd des e⁻ → <b>cation</b> (ion positif) : Na → Na⁺, Ca → Ca²⁺</li><li>Atome gagne des e⁻ → <b>anion</b> (ion négatif) : Cl → Cl⁻, O → O²⁻</li></ul><h3>Molécules et liaisons covalentes</h3><ul><li>Liaison covalente = partage de 2 électrons entre 2 atomes</li><li>H₂O : 2H−O | CO₂ : O=C=O | CH₄ : C au centre + 4H</li></ul><h3>⚠️ Pièges</h3><ul><li>Le numéro atomique Z = protons = électrons (seulement si atome NEUTRE)</li><li>Les isotopes ont le même Z mais des A différents (même élément, masse différente)</li></ul><div class="memo">🧠 Z=protons=électrons (neutre). A=protons+neutrons. Cation=perd e⁻(+). Anion=gagne e⁻(−). Na⁺=sodium+. Cl⁻=chlorure−.</div>`,
qcm:[
{q:'Le numéro atomique Z = ?',opts:['Nombre de neutrons','Nombre de protons','Électrons de valence','Nucléons totaux'],answer:1,exp:'Z = nombre de protons (et d\'électrons pour un atome neutre)'},
{q:'Un ion positif (cation) est un atome qui a ?',opts:['Gagné des électrons','Perdu des protons','Perdu des électrons','Gagné des protons'],answer:2,exp:'Cation = perd des e⁻ → charge positive (ex: Na perd 1 e⁻ → Na⁺)'},
{q:'A = nombre de masse = ?',opts:['Protons seulement','Électrons seulement','Protons + neutrons','Protons + électrons'],answer:2,exp:'A = Z + N = protons + neutrons (= nucléons)'},
{q:'Carbone ¹²₆C : combien de neutrons ?',opts:['6','12','18','0'],answer:0,exp:'N = A − Z = 12 − 6 = 6 neutrons'},
{q:'Isotopes d\'un même élément ont ?',opts:['Même A, Z différent','Même Z, A différent','Même A et Z','Même nombre de neutrons'],answer:1,exp:'Isotopes = même Z (même élément) mais A différent (nombre de neutrons différent)'},
{q:'La liaison covalente est ?',opts:['Un transfert d\'électrons','Un partage de 2 électrons entre 2 atomes','Une attraction électrostatique entre ions','Une liaison entre protons'],answer:1,exp:'Liaison covalente = partage de 2 électrons (paire liante) entre 2 atomes'},
]},
{id:'PC05',title:'Chimie : réactions & pH',sub:'Conservation · Équilibrer · pH · Acides/Bases',
content:`<h3>Réaction chimique</h3><ul><li>Réactifs → Produits (flèche ou = avec conditions)</li><li><b>Conservation de la masse</b> (Lavoisier) : masse réactifs = masse produits</li><li><b>Conservation des éléments</b> : même nombre d'atomes de chaque côté → équilibrer</li></ul><h3>Méthode équilibration</h3><p>Ajuster les coefficients (pas les indices !) devant les formules.<br>Ex : _H₂ + _O₂ → _H₂O → 2H₂ + O₂ → 2H₂O</p><h3>pH et acides/bases</h3><ul><li>pH &lt; 7 : acide (citron pH≈2, vinaigre pH≈3)</li><li>pH = 7 : neutre (eau pure)</li><li>pH &gt; 7 : basique (savon pH≈9, soude pH≈13)</li></ul><h3>Indicateurs colorés</h3><p>BBT : jaune(acide) / vert(neutre) / bleu(base)<br>Phénolphtaléine : incolore(acide/neutre) / rose(base)</p><div class="memo">🧠 pH &lt; 7 = acide. pH = 7 = neutre. pH &gt; 7 = basique. Lavoisier : rien ne se crée, rien ne se perd. Équilibrer = coefficients (pas les indices !).</div>`,
qcm:[
{q:'pH = 3 indique une solution ?',opts:['Neutre','Basique','Acide','Très basique'],answer:2,exp:'pH < 7 → acide'},
{q:'Loi de conservation de la masse ?',opts:['Masse augmente','Masse diminue','Masse totale reste identique','Dépend de la température'],answer:2,exp:'Lavoisier : "rien ne se crée, rien ne se perd, tout se transforme"'},

// ═══════════════════════════════════════════════
// BUILD POOL — 500 questions from all subjects
// ═══════════════════════════════════════════════
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildPool(n){
  // Collect all questions with metadata
  const all=[];
  for(const subj of SUBJECTS){
    for(const card of subj.cards){
      for(const q of card.qcm){
        all.push({...q, _subj:subj.name, _icon:subj.icon, _card:card.title, _color:subj.color, _sid:subj.id});
      }
    }
  }
  // Build n questions: shuffle repeatedly until we have n
  const pool=[];
  while(pool.length < n){
    const batch=shuffle(all);
    for(const q of batch){
      if(pool.length>=n) break;
      // Shuffle options
      const order=shuffle([0,1,2,3]);
      pool.push({...q, opts:order.map(i=>q.opts[i]), answer:order.indexOf(q.answer)});
    }
  }
  return pool;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const TOTAL = 500;
let E = {
  view: 'home',
  pool: [],
  idx: 0,
  answered: false,
  selectedOpt: null,
  correct: 0,
  wrong: 0,
  hackCount: 0,
  streak: [],         // array of 'ok'|'ko' for last 20
  bySubj: {},         // {sid: {c,t}}
  startTime: null,
  pendingHack: false,
};

// ═══════════════════════════════════════════════
// ANTI-HACK
// ═══════════════════════════════════════════════
document.addEventListener('visibilitychange',()=>{
  if(E.view==='qcm' && !E.answered && document.hidden){
    E.hackCount++;
    E.pendingHack=true;
    document.getElementById('hackwarn').classList.add('show');
  }
});
window.addEventListener('blur',()=>{
  if(E.view==='qcm' && !E.answered){
    E.hackCount++;
    E.pendingHack=true;
    document.getElementById('hackwarn').classList.add('show');
  }
});
function dismissHack(){
  document.getElementById('hackwarn').classList.remove('show');
  if(E.pendingHack){
    // Mark current question as wrong (penalize)
    E.pendingHack=false;
    if(!E.answered){
      E.answered=true;
      E.selectedOpt=-1; // invalid
      const q=E.pool[E.idx];
      const sid=q._sid;
      if(!E.bySubj[sid]) E.bySubj[sid]={c:0,t:0};
      E.bySubj[sid].t++;
      E.wrong++;
      E.streak.push('ko');
      if(E.streak.length>20) E.streak.shift();
      render();
    }
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(E.view==='home') app.innerHTML=renderHome();
  else if(E.view==='qcm') app.innerHTML=renderQcm();
  else if(E.view==='results') app.innerHTML=renderResults();
  bind();
}

function renderHome(){
  return `<div class="home">
    <h1>🎯 Grand Examen Final</h1>
    <p style="font-size:1.1rem;color:var(--txt);font-weight:700;margin-bottom:4px">${TOTAL} questions · Toutes matières · Mélange aléatoire</p>
    <p>Questions et réponses mélangées à chaque fois</p>
    <div class="warn">
      ⚠️ <strong>Règles de l'examen :</strong><br>
      — Ne pas quitter la fenêtre pendant une question<br>
      — Ne pas chercher les réponses dans les fiches<br>
      — Toute sortie de fenêtre est détectée et pénalisée<br>
      — Le code final indique le nombre de tentatives de triche
    </div>
    <button class="start-btn" data-action="start">🚀 Commencer l'examen</button>
  </div>`;
}

function renderQcm(){
  const q=E.pool[E.idx];
  const done=E.idx+1;
  const pct=Math.round(done/TOTAL*100);
  const scorePct=E.idx>0?Math.round(E.correct/(E.correct+E.wrong)*100):100;
  const sc=scorePct>=80?'sg':scorePct>=60?'so':'sr';

  // Streak dots (last 20)
  const dots=E.streak.map(s=>`<div class="sdot ${s}"></div>`).join('');
  const curDot=`<div class="sdot cur"></div>`;

  const opts=q.opts.map((o,i)=>{
    let cls='opt';
    if(E.answered){
      cls+=' dis';
      if(i===q.answer) cls+=' ok2';
      else if(i===E.selectedOpt) cls+=' ko2';
    }
    return `<div class="${cls}" data-action="answer" data-opt="${i}">
      <div class="ol">${['A','B','C','D'][i]}</div><span>${o}</span>
    </div>`;
  }).join('');

  const expl=E.answered&&E.selectedOpt!==-1?`<div class="expl fade">
    <strong>${E.selectedOpt===q.answer?'✅ Correct !':'❌ Incorrect.'}</strong> ${q.exp}
    <div class="src">${q._icon} ${q._subj} — ${q._card}</div>
  </div>`:E.answered&&E.selectedOpt===-1?`<div class="expl fade" style="border-color:#f87171">
    <strong>🚨 Question invalidée (sortie de fenêtre)</strong><br>
    <span class="src">${q._icon} ${q._subj} — ${q._card}</span>
  </div>`:'';

  const nxt=E.answered?`<div class="next-wrap">
    <button class="next-btn" data-action="next">${E.idx<TOTAL-1?'Question suivante →':'Voir les résultats →'}</button>
  </div>`:'';

  return `
  <div class="prog-wrap">
    <div class="prog-top">
      <span class="prog-label">Q${done}/${TOTAL}</span>
      <span class="prog-score ${sc}">✓ ${E.correct} · ✗ ${E.wrong}${E.hackCount>0?' · 🚨 '+E.hackCount:''}</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="stats-grid">
    <div class="stat"><div class="stat-v sg">${E.correct}</div><div class="stat-l">Bonnes</div></div>
    <div class="stat"><div class="stat-v sr">${E.wrong}</div><div class="stat-l">Mauvaises</div></div>
    <div class="stat"><div class="stat-v ${sc}">${E.idx>0?Math.round(E.correct/(E.correct+E.wrong)*100):100}%</div><div class="stat-l">Taux</div></div>
    <div class="stat"><div class="stat-v" style="color:${q._color}">${q._icon}</div><div class="stat-l">${q._subj.split(' ')[0]}</div></div>
  </div>
  <div class="streak-bar">${dots}${curDot}</div>
  <div class="subj-tag" style="color:${q._color};border-color:${q._color}44">${q._icon} ${q._card}</div>
  <div class="qbox ${E.answered?'':'fade'}">
    <div class="qtxt">${q.q}</div>
    <div class="opts">${opts}</div>
    ${expl}
  </div>
  ${nxt}`;
}

function renderResults(){
  const total=E.correct+E.wrong;
  const pct=Math.round(E.correct/total*100);
  const grade=pct>=95?'🏆 Excellent — Mention Très Bien':pct>=85?'🥇 Très bien — Mention Bien':pct>=70?'🥈 Bien — Mention Assez Bien':pct>=60?'🥉 Passable':'❌ Insuffisant';
  const col=pct>=85?'#4ade80':pct>=70?'#fbbf24':'#f87171';
  const elapsed=E.startTime?Math.round((Date.now()-E.startTime)/60000):0;

  // Per-subject breakdown
  const breakdown=SUBJECTS.map(s=>{
    const d=E.bySubj[s.id];
    if(!d||d.t===0) return '';
    const p=Math.round(d.c/d.t*100);
    const bc=p>=85?'#4ade80':p>=70?'#fbbf24':'#f87171';
    return `<div style="margin-bottom:14px">
      <div class="sbh2" style="color:${s.color}">${s.icon} ${s.name} <span style="color:var(--muted);font-size:.85rem;font-weight:600">· ${d.c}/${d.t}</span></div>
      <div class="sb-bar-wrap"><div class="sb-bar" style="width:${p}%;background:${bc}"></div></div>
      <div class="sb-label">${p}% de réussite</div>
    </div>`;
  }).join('');

  const hackNote=E.hackCount>0?`<div style="background:#2e1a0e;border:1px solid #f87171;border-radius:10px;padding:12px;margin-bottom:16px;color:#f87171;font-size:.9rem">🚨 <strong>${E.hackCount} sortie(s) de fenêtre détectée(s)</strong> pendant l'examen. Ces questions ont été invalidées.</div>`:'';

  const code=genCode();
  return `<div class="result-page">
    <div style="font-size:2rem">🎓</div>
    <h1>Résultats finaux</h1>
    <div class="big-score" style="color:${col}">${pct}%</div>
    <div class="grade">${grade}</div>
    <p style="color:var(--muted);margin-bottom:8px">${E.correct}/${total} bonnes réponses · ${elapsed} minutes</p>
    ${hackNote}
    <div class="subj-breakdown">${breakdown}</div>
    <div class="codebox">
      <h3>📬 Code à envoyer à ton parent</h3>
      <p style="color:var(--muted);font-size:.85rem;margin-bottom:10px">Copie et envoie ce code !</p>
      <div class="codetxt" id="codetext">${code}</div>
      <button class="copybtn" onclick="copyCode()">📋 Copier le code</button>
    </div>
    <button class="replay-btn" data-action="restart" style="display:block;margin:20px auto 0">🔄 Nouvel examen</button>
  </div>`;
}

// ═══════════════════════════════════════════════
// CODE GÉNÉRATION
// ═══════════════════════════════════════════════
function genCode(){
  const data={
    v:'exam500',
    d:new Date().toLocaleDateString('fr-FR'),
    score:`${E.correct}/${E.correct+E.wrong}`,
    pct:Math.round(E.correct/(E.correct+E.wrong)*100),
    hack:E.hackCount,
    mins:E.startTime?Math.round((Date.now()-E.startTime)/60000):0,
    subj:{}
  };
  for(const [sid,d] of Object.entries(E.bySubj)){
    const subj=SUBJECTS.find(s=>s.id===sid);
    if(subj) data.subj[subj.name]=`${d.c}/${d.t} (${Math.round(d.c/d.t*100)}%)`;
  }
  return btoa(unescape(encodeURIComponent(JSON.stringify(data)))).replace(/(.{60})/g,'$1\n').trim();
}
function copyCode(){
  navigator.clipboard.writeText(document.getElementById('codetext').textContent).then(()=>{
    const b=document.querySelector('.copybtn');
    b.textContent='✅ Copié !';b.style.background='#4ade80';b.style.color='#000';
    setTimeout(()=>{b.textContent='📋 Copier le code';b.style.background='';b.style.color='';},2000);
  });
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
function bind(){
  document.querySelectorAll('[data-action]').forEach(el=>el.addEventListener('click',handle));
}
function handle(e){
  const a=e.currentTarget.dataset.action;
  if(a==='start'||a==='restart'){
    E={view:'qcm',pool:buildPool(TOTAL),idx:0,answered:false,selectedOpt:null,
       correct:0,wrong:0,hackCount:0,streak:[],bySubj:{},startTime:Date.now(),pendingHack:false};
    render();
  }
  else if(a==='answer'){
    if(E.answered) return;
    const opt=+e.currentTarget.dataset.opt;
    E.selectedOpt=opt;E.answered=true;
    const q=E.pool[E.idx];
    const sid=q._sid;
    if(!E.bySubj[sid]) E.bySubj[sid]={c:0,t:0};
    E.bySubj[sid].t++;
    if(opt===q.answer){E.correct++;E.bySubj[sid].c++;E.streak.push('ok');}
    else{E.wrong++;E.streak.push('ko');}
    if(E.streak.length>20) E.streak.shift();
    render();
  }
  else if(a==='next'){
    if(E.idx<TOTAL-1){E.idx++;E.answered=false;E.selectedOpt=null;render();}
    else{E.view='results';render();}
  }
}

render();
</script></body></html>
