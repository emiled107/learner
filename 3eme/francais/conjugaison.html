<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugaison Battle - 3ème</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090f;
            font-family: 'Nunito', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 40px rgba(255, 0, 110, 0.3);
        }

        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            transition: transform 0.3s;
        }

        .back-link:hover {
            transform: scale(1.05);
        }

        .mode-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .tense-btn {
            padding: 25px;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(51, 56, 236, 0.1));
            border: 2px solid #ff006e;
            border-radius: 15px;
            color: #e0e0e0;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tense-btn:hover {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(51, 56, 236, 0.2));
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.2);
        }

        .tense-btn.mix {
            border-color: #3a86ff;
            background: linear-gradient(135deg, rgba(58, 134, 255, 0.1), rgba(131, 56, 236, 0.1));
        }

        .game-container {
            display: none;
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.8), rgba(20, 20, 40, 0.8));
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 0, 110, 0.2);
        }

        .game-container.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 0, 110, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .question-section {
            text-align: center;
            margin: 30px 0;
        }

        .question-num {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .verb-display {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.1), rgba(51, 56, 236, 0.1));
            padding: 25px;
            border-radius: 15px;
            margin: 20px 0;
        }

        .infinitive {
            font-size: 2em;
            color: #ff006e;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .prompt {
            font-size: 1.3em;
            color: #3a86ff;
            margin: 15px 0;
            font-weight: 700;
        }

        .tense-info {
            color: #b0b0b0;
            font-size: 0.95em;
            margin-top: 10px;
        }

        .input-section {
            margin: 30px 0;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid #3a86ff;
            border-radius: 10px;
            color: #e0e0e0;
            font-family: 'Nunito', sans-serif;
            transition: all 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: #ff006e;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 700;
            display: none;
        }

        .feedback.correct {
            display: block;
            background: rgba(0, 255, 100, 0.1);
            border: 2px solid #00ff64;
            color: #00ff64;
        }

        .feedback.incorrect {
            display: block;
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0040;
            color: #ff6b9b;
        }

        .correct-answer {
            color: #3a86ff;
            font-size: 1em;
            margin-top: 10px;
        }

        .results-screen {
            display: none;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        .results-screen.show {
            display: block;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .final-score {
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(135deg, #ff006e, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 30px 0;
        }

        .percentage {
            font-size: 1.5em;
            color: #b0b0b0;
            margin: 20px 0;
        }

        .stars {
            font-size: 3em;
            margin: 30px 0;
            letter-spacing: 10px;
        }

        .star-full { color: #ffd700; }
        .star-empty { color: #444; }

        .result-code {
            background: rgba(20, 20, 40, 0.8);
            padding: 20px;
            border-radius: 10px;
            margin: 30px 0;
            font-family: monospace;
            font-size: 0.85em;
            word-break: break-all;
            border: 1px solid #3a86ff;
        }

        .replay-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: 20px;
        }

        .replay-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2em;
            }

            .mode-selection {
                grid-template-columns: 1fr;
            }

            .answer-input {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/index.html" class="back-link">← Retour</a>

        <header>
            <div class="title">⚔️ CONJUGAISON BATTLE</div>
            <div class="subtitle">Maîtrise tous les temps du brevet</div>
        </header>

        <div id="modeSelection" class="mode-selection">
            <button class="tense-btn" onclick="startGame('présent')">Présent</button>
            <button class="tense-btn" onclick="startGame('imparfait')">Imparfait</button>
            <button class="tense-btn" onclick="startGame('passé simple')">Passé simple</button>
            <button class="tense-btn" onclick="startGame('futur')">Futur</button>
            <button class="tense-btn" onclick="startGame('passé composé')">Passé composé</button>
            <button class="tense-btn" onclick="startGame('plus-que-parfait')">Plus-que-parfait</button>
            <button class="tense-btn" onclick="startGame('conditionnel présent')">Conditionnel</button>
            <button class="tense-btn" onclick="startGame('subjonctif présent')">Subjonctif</button>
            <button class="tense-btn mix" onclick="startGame('brevet mix')">🎲 BREVET MIX</button>
        </div>

        <div id="gameContainer" class="game-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>

            <div class="question-section">
                <div class="question-num">Question <span id="questionNum">1</span>/20</div>
                <div class="verb-display">
                    <div class="infinitive" id="infinitive"></div>
                    <div class="prompt"><span id="pronoun"></span> → <span id="teneName"></span></div>
                    <div class="tense-info">Conjugue ce verbe au <span id="tenseDetail"></span></div>
                </div>
            </div>

            <div class="input-section">
                <input type="text" id="answerInput" class="answer-input" placeholder="Tape ta réponse..." autofocus>
                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">VÉRIFIER</button>
            </div>

            <div id="feedback" class="feedback"></div>
        </div>

        <div id="resultsScreen" class="results-screen">
            <h2 style="font-size: 2em; margin-bottom: 20px;">Session terminée!</h2>
            <div class="final-score" id="finalScore">20/20</div>
            <div class="percentage" id="percentDisplay">100%</div>
            <div class="stars" id="starsDisplay">⭐⭐⭐</div>
            <div class="result-code" id="resultCode"></div>
            <button class="replay-btn" onclick="location.reload()">Rejouer</button>
        </div>
    </div>

        const TENSE_NAMES = {
            'présent': 'Présent',
            'imparfait': 'Imparfait',
            'passé simple': 'Passé simple',
            'futur': 'Futur',
            'passé composé': 'Passé composé',
            'plus-que-parfait': 'Plus-que-parfait',
            'conditionnel présent': 'Conditionnel présent',
            'subjonctif présent': 'Subjonctif présent'
        };

        const VERBS = Object.keys(CONJUGATIONS);

        let gameState = {
            mode: null,
            currentQuestion: 0,
            score: 0,
            selectedTense: null,
            questions: [],
            currentQuestionData: null,
            answered: false
        };

        function normalizeFrench(text) {
            return text.toLowerCase()
                .replace(/à|á|â|ã|ä/g, 'a')
                .replace(/è|é|ê|ë/g, 'e')
                .replace(/ì|í|î|ï/g, 'i')
                .replace(/ò|ó|ô|õ|ö/g, 'o')
                .replace(/ù|ú|û|ü/g, 'u')
                .replace(/ç/g, 'c')
                .trim();
        }

        function startGame(mode) {
            gameState.mode = mode;
            gameState.currentQuestion = 0;
            gameState.score = 0;
            gameState.answered = false;
            gameState.questions = [];

            if (mode === 'brevet mix') {
                const allTenses = Object.keys(TENSES);
                for (let i = 0; i < 20; i++) {
                    const randomTense = allTenses[Math.floor(Math.random() * allTenses.length)];
                    gameState.questions.push(randomTense);
                }
            } else {
                gameState.questions = Array(20).fill(mode);
            }

            document.getElementById('modeSelection').style.display = 'none';
            document.getElementById('gameContainer').classList.add('active');
            loadQuestion();
        }

        function loadQuestion() {
            if (gameState.currentQuestion >= 20) {
                endGame();
                return;
            }

            gameState.answered = false;
            const tense = gameState.questions[gameState.currentQuestion];
            const verb = VERBS[Math.floor(Math.random() * VERBS.length)];
            const pronoun = Math.floor(Math.random() * 6);

            gameState.currentQuestionData = {
                verb,
                pronoun,
                tense,
                correctAnswer: CONJUGATIONS[verb][TENSES[tense]][pronoun]
            };

            const progress = ((gameState.currentQuestion) / 20) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNum').textContent = gameState.currentQuestion + 1;
            document.getElementById('infinitive').textContent = verb;
            document.getElementById('pronoun').textContent = PRONOUNS[pronoun];
            document.getElementById('teneName').textContent = TENSE_NAMES[tense];
            document.getElementById('tenseDetail').textContent = tense.toLowerCase();
            document.getElementById('answerInput').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('answerInput').focus();
            document.getElementById('submitBtn').disabled = false;
        }

        function submitAnswer() {
            if (gameState.answered) {
                gameState.currentQuestion++;
                loadQuestion();
                return;
            }

            gameState.answered = true;
            const userAnswer = normalizeFrench(document.getElementById('answerInput').value);
            const correctAnswer = normalizeFrench(gameState.currentQuestionData.correctAnswer);
            const isCorrect = userAnswer === correctAnswer;

            if (isCorrect) {
                gameState.score++;
                document.getElementById('feedback').className = 'feedback correct';
                document.getElementById('feedback').innerHTML = '✓ Correct!';
            } else {
                document.getElementById('feedback').className = 'feedback incorrect';
                document.getElementById('feedback').innerHTML = `✗ Incorrect<div class="correct-answer">Bonne réponse: <strong>${gameState.currentQuestionData.correctAnswer}</strong></div>`;
            }

            document.getElementById('submitBtn').textContent = 'Suivant →';
        }

        function endGame() {
            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = Math.round((gameState.score / 20) * 100);
            const stars = Math.round((gameState.score / 20) * 3);

            document.getElementById('finalScore').textContent = `${gameState.score}/20`;
            document.getElementById('percentDisplay').textContent = `${percentage}%`;

            let starDisplay = '';
            for (let i = 0; i < 3; i++) {
                starDisplay += i < stars ? '<span class="star-full">⭐</span>' : '<span class="star-empty">☆</span>';
            }
            document.getElementById('starsDisplay').innerHTML = starDisplay;

            const now = new Date().toISOString().split('T')[0];
            const resultCode = btoa(JSON.stringify({
                v: 'c_conj',
                dt: now,
                tense: gameState.mode,
                score: `${gameState.score}/20`,
                pct: percentage,
                stars: stars
            }));

            document.getElementById('resultCode').textContent = resultCode;
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('gameContainer').classList.contains('active')) {
                submitAnswer();
            }
        });
