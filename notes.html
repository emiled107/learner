<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - Brevet 3ème</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .back-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #93c5fd;
        }

        h1 {
            font-size: 32px;
            text-align: center;
            flex: 1;
        }

        .overall-avg {
            font-size: 18px;
            font-weight: 700;
            padding: 15px 20px;
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid #3b82f6;
            border-radius: 8px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: rgba(71, 85, 105, 0.5);
            color: #e2e8f0;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab-btn.active {
            background: #3b82f6;
            transform: scale(1.05);
        }

        .tab-btn:hover {
            background: #475569;
        }

        .tab-content {
            display: none;
            background: rgba(30, 27, 75, 0.8);
            border: 2px solid #3b82f6;
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .tab-content.active {
            display: block;
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #475569;
        }

        .subject-title {
            font-size: 24px;
            font-weight: 700;
        }

        .subject-avg {
            font-size: 18px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .subject-avg.green {
            background: rgba(34, 197, 94, 0.3);
            color: #86efac;
            border: 1px solid #22c55e;
        }

        .subject-avg.orange {
            background: rgba(249, 115, 22, 0.3);
            color: #fed7aa;
            border: 1px solid #f97316;
        }

        .subject-avg.red {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .chapters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .chapter {
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }

        .chapter:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .chapter-name {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: capitalize;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group label {
            font-size: 12px;
            color: #94a3b8;
            display: block;
            margin-bottom: 4px;
        }

        .input-wrapper {
            flex: 1;
        }

        .input-wrapper-coef {
            width: 80px;
        }

        input {
            width: 100%;
            padding: 8px 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #475569;
            border-radius: 4px;
            color: #e2e8f0;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        input[type="number"] {
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Nunito', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: rgba(71, 85, 105, 0.5);
            color: #e2e8f0;
            border: 1px solid #475569;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.8);
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid #475569;
            border-radius: 8px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-code {
            background: rgba(15, 23, 42, 0.8);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #475569;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .copy-btn {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #059669;
        }

        .copy-btn.copied {
            background: #6366f1;
        }

        .error-message {
            color: #fca5a5;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .tabs {
                gap: 8px;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 12px;
            }

            .chapters {
                grid-template-columns: 1fr;
            }

            .tab-content {
                padding: 20px;
            }

            .subject-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .arrow {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link"><span class="arrow">←</span> Retour</a>
            <h1>Mes Notes</h1>
            <div class="overall-avg" id="overallAvg">Moyenne globale: 0.00</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-subject="anglais">Anglais</button>
            <button class="tab-btn" data-subject="maths">Maths</button>
            <button class="tab-btn" data-subject="francais">Français</button>
            <button class="tab-btn" data-subject="histoire-geo">Histoire-Géo</button>
            <button class="tab-btn" data-subject="sciences">Sciences</button>
        </div>

        <!-- Anglais -->
        <div class="tab-content active" id="tab-anglais">
            <div class="subject-header">
                <div class="subject-title">Anglais</div>
                <div class="subject-avg" id="avg-anglais">Moyenne: 0.00</div>
            </div>
            <div class="chapters" id="chapters-anglais"></div>
        </div>

        <!-- Maths -->
        <div class="tab-content" id="tab-maths">
            <div class="subject-header">
                <div class="subject-title">Maths</div>
                <div class="subject-avg" id="avg-maths">Moyenne: 0.00</div>
            </div>
            <div class="chapters" id="chapters-maths"></div>
        </div>

        <!-- Français -->
        <div class="tab-content" id="tab-francais">
            <div class="subject-header">
                <div class="subject-title">Français</div>
                <div class="subject-avg" id="avg-francais">Moyenne: 0.00</div>
            </div>
            <div class="chapters" id="chapters-francais"></div>
        </div>

        <!-- Histoire-Géo -->
        <div class="tab-content" id="tab-histoire-geo">
            <div class="subject-header">
                <div class="subject-title">Histoire-Géo</div>
                <div class="subject-avg" id="avg-histoire-geo">Moyenne: 0.00</div>
            </div>
            <div class="chapters" id="chapters-histoire-geo"></div>
        </div>

        <!-- Sciences -->
        <div class="tab-content" id="tab-sciences">
            <div class="subject-header">
                <div class="subject-title">Sciences</div>
                <div class="subject-avg" id="avg-sciences">Moyenne: 0.00</div>
            </div>
            <div class="chapters" id="chapters-sciences"></div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="generateBtn">Générer mon code</button>
            <button class="btn btn-secondary" id="resetBtn">Réinitialiser</button>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-title">Code généré (base64):</div>
            <div class="result-code" id="resultCode"></div>
            <button class="copy-btn" id="copyBtn">Copier le code</button>
        </div>
    </div>

    <script>
        const subjects = {
            anglais: {
                label: 'Anglais',
                chapters: [
                    'Verbes irréguliers',
                    'Present perfect',
                    'Preterit',
                    'Comparatifs/Superlatifs',
                    'Voix passive',
                    'Conditionnel',
                    'Vocabulaire courant'
                ]
            },
            maths: {
                label: 'Maths',
                chapters: [
                    'Théorème de Thalès',
                    'Théorème de Pythagore',
                    'Trigonométrie',
                    'Fonctions linéaires/affines',
                    'Équations/inéquations',
                    'Statistiques/probabilités',
                    'Calcul littéral',
                    'Géométrie dans l\'espace'
                ]
            },
            francais: {
                label: 'Français',
                chapters: [
                    'Grammaire',
                    'Conjugaison',
                    'Orthographe',
                    'Rédaction',
                    'Compréhension de texte',
                    'Figures de style',
                    'Argumentation'
                ]
            },
            'histoire-geo': {
                label: 'Histoire-Géo',
                chapters: [
                    'Première Guerre mondiale',
                    'Démocraties et totalitarismes',
                    'Seconde Guerre mondiale',
                    'La France depuis 1945',
                    'Aménagement du territoire',
                    'L\'Union européenne',
                    'EMC'
                ]
            },
            sciences: {
                label: 'Sciences',
                chapters: [
                    'L\'énergie et ses conversions',
                    'Signaux et information',
                    'Organisation de la matière',
                    'Mouvement et interactions',
                    'La Terre et l\'environnement',
                    'Le vivant et son évolution',
                    'Le corps humain et la santé'
                ]
            }
        };

        // Initialize subjects
        function initializeSubjects() {
            Object.keys(subjects).forEach(subjectKey => {
                const chapters = subjects[subjectKey].chapters;
                const container = document.getElementById(`chapters-${subjectKey}`);

                chapters.forEach((chapter, index) => {
                    const chapterId = `${subjectKey}-${index}`;
                    const chapterEl = document.createElement('div');
                    chapterEl.className = 'chapter';
                    chapterEl.innerHTML = `
                        <div class="chapter-name">${chapter}</div>
                        <div class="input-group">
                            <div class="input-wrapper">
                                <label>Note (sur 20)</label>
                                <input type="number" class="note-input" data-subject="${subjectKey}" data-chapter="${index}" min="0" max="20" step="0.5" value="0">
                                <div class="error-message"></div>
                            </div>
                            <div class="input-wrapper-coef">
                                <label>Coef</label>
                                <input type="number" class="coef-input" data-subject="${subjectKey}" data-chapter="${index}" min="0.5" max="5" step="0.5" value="1">
                            </div>
                        </div>
                    `;
                    container.appendChild(chapterEl);
                });
            });

            // Add event listeners
            document.querySelectorAll('.note-input, .coef-input').forEach(input => {
                input.addEventListener('change', updateAverages);
                input.addEventListener('input', updateAverages);
            });

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const subject = btn.dataset.subject;
                    switchTab(subject);
                });
            });

            // Generate and Reset buttons
            document.getElementById('generateBtn').addEventListener('click', generateCode);
            document.getElementById('resetBtn').addEventListener('click', resetForm);
            document.getElementById('copyBtn').addEventListener('click', copyCode);
        }

        function switchTab(subject) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(`tab-${subject}`).classList.add('active');
            document.querySelector(`[data-subject="${subject}"]`).classList.add('active');
        }

        function updateAverages() {
            let globalSum = 0;
            let globalCount = 0;

            Object.keys(subjects).forEach(subjectKey => {
                const notes = [];
                const coefs = [];

                document.querySelectorAll(`.note-input[data-subject="${subjectKey}"]`).forEach(input => {
                    const note = parseFloat(input.value) || 0;
                    const index = parseInt(input.dataset.chapter);
                    const coef = parseFloat(document.querySelector(`.coef-input[data-subject="${subjectKey}"][data-chapter="${index}"]`).value) || 1;

                    if (note > 0) {
                        notes.push(note);
                        coefs.push(coef);
                    }
                });

                // Calculate weighted average
                let subjectAvg = 0;
                if (notes.length > 0) {
                    let weightedSum = 0;
                    let totalCoef = 0;
                    notes.forEach((note, idx) => {
                        weightedSum += note * coefs[idx];
                        totalCoef += coefs[idx];
                    });
                    subjectAvg = weightedSum / totalCoef;
                    globalSum += subjectAvg;
                    globalCount++;
                }

                // Update subject average display
                const avgElement = document.getElementById(`avg-${subjectKey}`);
                if (avgElement) {
                    avgElement.textContent = `Moyenne: ${subjectAvg.toFixed(2)}`;
                    avgElement.className = 'subject-avg';
                    if (subjectAvg >= 14) {
                        avgElement.classList.add('green');
                    } else if (subjectAvg >= 10) {
                        avgElement.classList.add('orange');
                    } else if (subjectAvg > 0) {
                        avgElement.classList.add('red');
                    }
                }
            });

            // Update global average
            const globalAvg = globalCount > 0 ? globalSum / globalCount : 0;
            const globalAvgElement = document.getElementById('overallAvg');
            globalAvgElement.textContent = `Moyenne globale: ${globalAvg.toFixed(2)}`;

            if (globalAvg >= 14) {
                globalAvgElement.style.borderColor = '#22c55e';
                globalAvgElement.style.background = 'rgba(34, 197, 94, 0.2)';
            } else if (globalAvg >= 10) {
                globalAvgElement.style.borderColor = '#f97316';
                globalAvgElement.style.background = 'rgba(249, 115, 22, 0.2)';
            } else if (globalAvg > 0) {
                globalAvgElement.style.borderColor = '#ef4444';
                globalAvgElement.style.background = 'rgba(239, 68, 68, 0.2)';
            }
        }

        function generateCode() {
            const data = {
                v: 'notes',
                dt: new Date().toLocaleDateString('fr-FR'),
                subjects: {},
                avg_global: 0
            };

            let globalSum = 0;
            let globalCount = 0;

            Object.keys(subjects).forEach(subjectKey => {
                const chapters = [];
                const notes = [];
                const coefs = [];

                document.querySelectorAll(`.note-input[data-subject="${subjectKey}"]`).forEach(input => {
                    const index = parseInt(input.dataset.chapter);
                    const note = parseFloat(input.value) || 0;
                    const coef = parseFloat(document.querySelector(`.coef-input[data-subject="${subjectKey}"][data-chapter="${index}"]`).value) || 1;

                    chapters.push({
                        name: subjects[subjectKey].chapters[index],
                        note: note,
                        coef: coef
                    });

                    if (note > 0) {
                        notes.push(note);
                        coefs.push(coef);
                    }
                });

                let subjectAvg = 0;
                if (notes.length > 0) {
                    let weightedSum = 0;
                    let totalCoef = 0;
                    notes.forEach((note, idx) => {
                        weightedSum += note * coefs[idx];
                        totalCoef += coefs[idx];
                    });
                    subjectAvg = weightedSum / totalCoef;
                    globalSum += subjectAvg;
                    globalCount++;
                }

                data.subjects[subjectKey] = {
                    avg: Math.round(subjectAvg * 100) / 100,
                    chapters: chapters
                };
            });

            data.avg_global = globalCount > 0 ? Math.round((globalSum / globalCount) * 100) / 100 : 0;

            const jsonString = JSON.stringify(data);
            const base64Code = btoa(jsonString);

            document.getElementById('resultCode').textContent = base64Code;
            document.getElementById('resultSection').classList.add('active');
        }

        function copyCode() {
            const code = document.getElementById('resultCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = 'Copié !';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copier le code';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function resetForm() {
            document.querySelectorAll('.note-input, .coef-input').forEach(input => {
                if (input.classList.contains('note-input')) {
                    input.value = '0';
                } else {
                    input.value = '1';
                }
            });
            document.getElementById('resultSection').classList.remove('active');
            updateAverages();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeSubjects);
    </script>
</body>
</html>
