<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatismes Maths - 2nde</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090f;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #1a1d2e 0%, #16111f 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header p {
            color: #aaa;
            font-size: 0.95em;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .theme-btn {
            padding: 15px;
            border: 2px solid;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
        }

        .theme-btn:nth-child(1) {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .theme-btn:nth-child(1):hover {
            background: rgba(255, 107, 107, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .theme-btn:nth-child(2) {
            border-color: #ffd93d;
            color: #ffd93d;
        }

        .theme-btn:nth-child(2):hover {
            background: rgba(255, 217, 61, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 217, 61, 0.3);
        }

        .theme-btn:nth-child(3) {
            border-color: #6bcf7f;
            color: #6bcf7f;
        }

        .theme-btn:nth-child(3):hover {
            background: rgba(107, 207, 127, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(107, 207, 127, 0.3);
        }

        .theme-btn:nth-child(4) {
            border-color: #4d96ff;
            color: #4d96ff;
        }

        .theme-btn:nth-child(4):hover {
            background: rgba(77, 150, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(77, 150, 255, 0.3);
        }

        .theme-btn:nth-child(5) {
            border-color: #c77dff;
            color: #c77dff;
        }

        .theme-btn:nth-child(5):hover {
            background: rgba(199, 125, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(199, 125, 255, 0.3);
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .quiz-screen {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 0.9em;
        }

        .timer {
            background: rgba(255, 107, 107, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            color: #ff6b6b;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.4;
        }

        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .option.selected {
            border-color: #4d96ff;
            background: rgba(77, 150, 255, 0.2);
        }

        .option.correct {
            border-color: #6bcf7f;
            background: rgba(107, 207, 127, 0.2);
            animation: pulse 0.5s ease;
        }

        .option.incorrect {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.2);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-screen {
            text-align: center;
        }

        .score-display {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, #6bcf7f, #4d96ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }

        .percentage {
            font-size: 1.5em;
            color: #aaa;
            margin-bottom: 20px;
        }

        .stars {
            font-size: 3em;
            margin: 20px 0;
            letter-spacing: 10px;
        }

        .result-code {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85em;
            word-break: break-all;
            color: #6bcf7f;
            font-family: monospace;
            max-height: 150px;
            overflow-y: auto;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4d96ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #ff6b6b;
            transform: translateX(-3px);
        }

        .explanation {
            background: rgba(77, 150, 255, 0.1);
            border-left: 4px solid #4d96ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.95em;
            line-height: 1.5;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .theme-selector {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .theme-btn {
                padding: 12px;
                font-size: 0.8em;
            }

            .question-text {
                font-size: 1.1em;
            }

            .score-display {
                font-size: 2.2em;
            }

            .stars {
                font-size: 2em;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Theme Selection Screen -->
        <div class="screen active" id="themeScreen">
            <div class="header">
                <h1>⚡ Automatismes Maths</h1>
                <p>Entraîne-toi avec des exercices rapides - 20 questions, 30s chacune</p>
            </div>
            <div class="theme-selector" id="themeSelector"></div>
        </div>

        <!-- Quiz Screen -->
        <div class="screen" id="quizScreen">
            <div class="question-info">
                <span id="questionNumber"></span>
                <span class="timer" id="timer">30s</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div class="explanation" id="explanation"></div>
            <button class="btn" id="nextBtn">Réponse suivante</button>
        </div>

        <!-- Results Screen -->
        <div class="screen results-screen" id="resultsScreen">
            <h2>Quiz Terminé!</h2>
            <div class="score-display" id="scoreDisplay"></div>
            <div class="percentage" id="percentageDisplay"></div>
            <div class="stars" id="starsDisplay"></div>
            <div class="result-code">
                <strong>Code de résultat:</strong><br>
                <span id="resultCode"></span>
            </div>
            <button class="btn" onclick="location.reload()">Rejouer</button>
            <a href="/index.html" class="back-link">← Retour à l'accueil</a>
        </div>
    </div>

                {q: 'Volume cylindre r=2, h=5:', a: ['20π', '10π', '40π', '4π'], c: 0},
                {q: 'Angle droit=? degrés', a: ['90', '180', '45', '360'], c: 0},
                {q: 'Somme angles triangle:', a: ['180°', '360°', '90°', '270°'], c: 0},
                {q: 'Distance (1,2) à (4,2):', a: ['3', '4', '5', '6'], c: 0},
                {q: 'Vecteur nul (0,0), norme=?', a: ['0', '1', 'Infini', 'Indéfini'], c: 0}
            ]
        };

        let currentTheme = '';
        let currentQuestionIndex = 0;
        let score = 0;
        let answers = [];
        let timeLeft = 30;
        let timerInterval = null;
        let themeQuestions = [];

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz(theme) {
            currentTheme = theme;
            themeQuestions = shuffle([...questions[theme]]).slice(0, 20);
            currentQuestionIndex = 0;
            score = 0;
            answers = [];
            document.getElementById('themeScreen').classList.remove('active');
            document.getElementById('quizScreen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const q = themeQuestions[currentQuestionIndex];
            document.getElementById('questionNumber').textContent = `Question ${currentQuestionIndex + 1}/20`;
            document.getElementById('questionText').textContent = q.q;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            q.a.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = option;
                div.onclick = () => selectOption(index);
                optionsContainer.appendChild(div);
            });

            document.getElementById('explanation').classList.remove('show');
            document.getElementById('nextBtn').textContent = 'Vérifier';
            document.getElementById('nextBtn').disabled = false;

            updateProgress();
            resetTimer();
        }

        function selectOption(index) {
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) opt.classList.add('selected');
            });
        }

        function nextQuestion() {
            const selectedIdx = Array.from(document.querySelectorAll('.option')).findIndex(o => o.classList.contains('selected'));

            if (selectedIdx === -1) return;

            const q = themeQuestions[currentQuestionIndex];
            const isCorrect = selectedIdx === q.c;

            if (isCorrect) score++;
            answers.push({q: q.q, selected: selectedIdx === q.c, correct: q.c});

            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === q.c) opt.classList.add('correct');
                else if (i === selectedIdx && !isCorrect) opt.classList.add('incorrect');
            });

            document.getElementById('explanation').innerHTML = `
                <strong>Explication:</strong> La bonne réponse est "${q.a[q.c]}"
            `;
            document.getElementById('explanation').classList.add('show');
            document.getElementById('nextBtn').textContent = currentQuestionIndex < 19 ? 'Question suivante' : 'Résultats';

            currentQuestionIndex++;

            if (currentQuestionIndex < 20) {
                setTimeout(() => showQuestion(), 2000);
            } else {
                document.getElementById('nextBtn').onclick = () => showResults();
            }
        }

        document.getElementById('nextBtn').onclick = nextQuestion;

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            updateTimer();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                if (timeLeft <= 0) nextQuestion();
            }, 1000);
        }

        function updateTimer() {
            document.getElementById('timer').textContent = timeLeft + 's';
        }

        function updateProgress() {
            const percentage = ((currentQuestionIndex) / 20) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }

        function showResults() {
            clearInterval(timerInterval);
            document.getElementById('quizScreen').classList.remove('active');
            document.getElementById('resultsScreen').classList.add('active');

            const percentage = Math.round((score / 20) * 100);
            let stars = '☆☆☆';
            if (percentage >= 80) stars = '★★★';
            else if (percentage >= 60) stars = '★★☆';
            else if (percentage >= 40) stars = '★☆☆';

            document.getElementById('scoreDisplay').textContent = score + '/20';
            document.getElementById('percentageDisplay').textContent = percentage + '%';
            document.getElementById('starsDisplay').textContent = stars;

            const now = new Date();
            const dt = now.toISOString().split('T')[0];
            const resultCode = btoa(JSON.stringify({
                v: 'l_auto',
                dt: dt,
                theme: currentTheme,
                score: score + '/20',
                pct: percentage,
                stars: stars.includes('★') ? stars.match(/★/g).length : 0
            }));

            document.getElementById('resultCode').textContent = resultCode;
        }

        const selector = document.getElementById('themeSelector');
        Object.keys(questions).forEach(theme => {
            const btn = document.createElement('button');
            btn.className = 'theme-btn';
            btn.textContent = theme;
            btn.onclick = () => startQuiz(theme);
            selector.appendChild(btn);
        });
    </script>
</body>
</html>
