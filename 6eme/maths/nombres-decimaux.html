<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nombres et Décimaux - 6ème Maths</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090f;
            color: #e0e0ff;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(135deg, #1a1d2e 0%, #16192b 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #6a4cff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d 0%, #6a4cff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2d3f;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #6a4cff);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 12px;
            color: #9d9dff;
            font-weight: 600;
        }

        .question-container {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .question-container.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 12px;
            color: #00d4ff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            color: #ffffff;
            line-height: 1.5;
        }

        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .option {
            padding: 15px;
            background: #2a2d3f;
            border: 2px solid #4a4d5f;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 500;
        }

        .option:hover {
            border-color: #6a4cff;
            background: #32354d;
        }

        .option.selected {
            background: #6a4cff;
            border-color: #8a6cff;
            color: #ffffff;
        }

        .option.correct {
            background: #00d47f;
            border-color: #00ff9f;
            color: #ffffff;
        }

        .option.incorrect {
            background: #ff4757;
            border-color: #ff6b7f;
            color: #ffffff;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #00d47f33;
            border-left: 4px solid #00d47f;
            color: #00ffaf;
        }

        .feedback.incorrect {
            background: #ff475733;
            border-left: 4px solid #ff4757;
            color: #ff9db3;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6a4cff, #00d4ff);
            color: #ffffff;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(106, 76, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2a2d3f;
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }

        .btn-secondary:hover {
            background: #00d4ff;
            color: #08090f;
        }

        .results-screen {
            display: none;
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        .results-screen.show {
            display: block;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #6a4cff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 14px;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
        }

        .score-max {
            font-size: 18px;
            color: #ffffff;
            opacity: 0.8;
        }

        .score-percentage {
            font-size: 28px;
            font-weight: 800;
            color: #00ffaf;
            margin: 15px 0;
        }

        .stars {
            font-size: 40px;
            margin: 15px 0;
            letter-spacing: 5px;
        }

        .result-message {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            color: #e0e0ff;
        }

        .result-code {
            background: #0a0c14;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ffaf;
            word-break: break-all;
            line-height: 1.6;
            overflow-x: auto;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .back-link a:hover {
            color: #00ffaf;
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nombres et Décimaux</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Question 1 / 20</div>
        </div>

        <div id="questionsSection">
            <div id="questionContainer" class="question-container active">
                <div class="question-number" id="questionNum">Question 1</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
                <div class="button-group">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">Valider</button>
                </div>
            </div>
        </div>

        <div class="results-screen" id="resultsScreen">
            <h2 style="font-size: 24px; color: #e0e0ff; margin-bottom: 20px;">Résultats</h2>
            <div class="score-circle">
                <div class="score-number" id="scoreNumber">0</div>
                <div class="score-max">/ 20</div>
            </div>
            <div class="score-percentage" id="scorePercentage">0%</div>
            <div class="stars" id="stars"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-code" id="resultCode"></div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="restartQuiz()">Recommencer</button>
                <button class="btn btn-secondary" onclick="goHome()">Retour accueil</button>
            </div>
        </div>

        <div class="back-link">
            <a href="/index.html">← Retour à l'accueil</a>
        </div>
    </div>

    <script>
        // Question pool
        const questions = [
            {
                question: "Quel est le plus grand : 3,5 ou 3,50 ?",
                options: ["3,5", "3,50", "Ils sont égaux", "Impossible à comparer"],
                correct: 2,
                explanation: "3,5 et 3,50 représentent le même nombre. Les zéros après la dernière décimale n'ont pas de valeur."
            },
            {
                question: "Compare : 2,15 __ 2,5",
                options: ["2,15 > 2,5", "2,15 = 2,5", "2,15 < 2,5", "Impossible à dire"],
                correct: 2,
                explanation: "2,15 < 2,5 car 2,1 < 2,5"
            },
            {
                question: "Quel nombre est entre 4,2 et 4,3 ?",
                options: ["4,15", "4,25", "4,35", "4,45"],
                correct: 1,
                explanation: "4,25 se situe entre 4,2 et 4,3"
            },
            {
                question: "Encadre 7,38 entre deux entiers consécutifs : __ < 7,38 < __",
                options: ["6 < 7,38 < 8", "7 < 7,38 < 8", "7 < 7,38 < 9", "8 < 7,38 < 9"],
                correct: 1,
                explanation: "7,38 est compris entre 7 et 8"
            },
            {
                question: "Calcule : 3,5 + 2,3 = ?",
                options: ["5,8", "5,35", "6,3", "5,5"],
                correct: 0,
                explanation: "3,5 + 2,3 = 5,8"
            },
            {
                question: "Calcule : 7,2 - 3,5 = ?",
                options: ["3,7", "4,7", "3,5", "4,2"],
                correct: 1,
                explanation: "7,2 - 3,5 = 3,7. Non, 7,2 - 3,5 = 3,7. Attendez : 7,2 - 3,5 = 3,7"
            },
            {
                question: "Calcule : 5,4 + 1,6 = ?",
                options: ["6,10", "7,0", "6,9", "7,10"],
                correct: 1,
                explanation: "5,4 + 1,6 = 7,0 (ou simplement 7)"
            },
            {
                question: "Calcule : 10 - 2,5 = ?",
                options: ["7,5", "8,5", "9,5", "12,5"],
                correct: 2,
                explanation: "10 - 2,5 = 9,5"
            },
            {
                question: "Quelle fraction représente le demi ? (1/2)",
                options: ["Un tiers", "Une moitié", "Un quart", "Trois quarts"],
                correct: 1,
                explanation: "1/2 représente une moitié"
            },
            {
                question: "Quelle fraction représente 1/4 ?",
                options: ["Une moitié", "Un tiers", "Un quart", "Une seconde"],
                correct: 2,
                explanation: "1/4 représente un quart"
            },
            {
                question: "Quel est le décimal équivalent à 1/2 ?",
                options: ["0,2", "0,5", "0,25", "0,75"],
                correct: 1,
                explanation: "1/2 = 0,5"
            },
            {
                question: "Quel est le décimal équivalent à 1/4 ?",
                options: ["0,4", "0,25", "0,50", "0,75"],
                correct: 1,
                explanation: "1/4 = 0,25"
            },
            {
                question: "Quel est le décimal équivalent à 3/4 ?",
                options: ["0,30", "0,50", "0,75", "0,80"],
                correct: 2,
                explanation: "3/4 = 0,75"
            },
            {
                question: "Quel est le décimal équivalent à 1/3 ?",
                options: ["0,25", "0,33...", "0,50", "0,66..."],
                correct: 1,
                explanation: "1/3 ≈ 0,33... (nombre décimal périodique)"
            },
            {
                question: "Où se place 0,5 sur une droite graduée de 0 à 1 ?",
                options: ["Au quart", "À la moitié", "Aux trois quarts", "À la fin"],
                correct: 1,
                explanation: "0,5 = 1/2, donc à la moitié entre 0 et 1"
            },
            {
                question: "Où se place 0,25 sur une droite graduée de 0 à 1 ?",
                options: ["Au quart", "À la moitié", "Aux trois quarts", "À un tiers"],
                correct: 0,
                explanation: "0,25 = 1/4, donc au quart entre 0 et 1"
            },
            {
                question: "Où se place 0,75 sur une droite graduée de 0 à 1 ?",
                options: ["Au quart", "À la moitié", "Aux trois quarts", "À zéro"],
                correct: 2,
                explanation: "0,75 = 3/4, donc aux trois quarts entre 0 et 1"
            },
            {
                question: "Calcule : 2,5 + 1,5 = ?",
                options: ["3,5", "4,0", "4,5", "3,10"],
                correct: 1,
                explanation: "2,5 + 1,5 = 4,0"
            },
            {
                question: "Calcule : 6,8 - 2,3 = ?",
                options: ["4,5", "4,6", "5,5", "4,3"],
                correct: 1,
                explanation: "6,8 - 2,3 = 4,5"
            },
            {
                question: "Quel nombre est le plus proche de 5 : 4,8 ou 5,2 ?",
                options: ["4,8", "5,2", "Ils sont équidistants", "C'est égal"],
                correct: 2,
                explanation: "4,8 est à 0,2 de 5, et 5,2 est aussi à 0,2 de 5. Ils sont équidistants."
            },
            {
                question: "Encadre 12,67 au dixième : __ < 12,67 < __",
                options: ["12,6 < 12,67 < 12,7", "12,6 < 12,67 < 12,8", "12 < 12,67 < 13", "12,60 < 12,67 < 12,70"],
                correct: 0,
                explanation: "12,67 est entre 12,6 et 12,7"
            },
            {
                question: "Compare : 5,09 __ 5,1",
                options: ["5,09 > 5,1", "5,09 = 5,1", "5,09 < 5,1", "Impossible"],
                correct: 2,
                explanation: "5,09 < 5,1 (car 5,09 < 5,10)"
            },
            {
                question: "Quel est le plus petit : 0,3 ou 0,03 ?",
                options: ["0,3", "0,03", "Ils sont égaux", "Ne peut pas se décider"],
                correct: 1,
                explanation: "0,03 est plus petit que 0,3"
            },
            {
                question: "Calcule : 3,2 + 4,8 = ?",
                options: ["7,10", "8,0", "8,10", "7,0"],
                correct: 1,
                explanation: "3,2 + 4,8 = 8,0"
            },
            {
                question: "Calcule : 9,5 - 4,5 = ?",
                options: ["5,0", "5,10", "4,5", "5,5"],
                correct: 0,
                explanation: "9,5 - 4,5 = 5,0"
            },
            {
                question: "Quel est l'encadrement au centième de 3,567 ?",
                options: ["3,5 < 3,567 < 3,6", "3,56 < 3,567 < 3,57", "3,560 < 3,567 < 3,580", "3 < 3,567 < 4"],
                correct: 1,
                explanation: "Au centième, 3,567 est entre 3,56 et 3,57"
            },
            {
                question: "Lequel de ces décimaux est un nombre entier ?",
                options: ["3,5", "4,0", "2,1", "0,9"],
                correct: 1,
                explanation: "4,0 est un nombre entier (4)"
            },
            {
                question: "Calcule : 1,25 + 0,75 = ?",
                options: ["1,100", "2,0", "1,50", "2,5"],
                correct: 1,
                explanation: "1,25 + 0,75 = 2,0"
            },
            {
                question: "Quel nombre se trouve entre 2,1 et 2,2 ?",
                options: ["2,05", "2,15", "2,25", "1,9"],
                correct: 1,
                explanation: "2,15 se situe entre 2,1 et 2,2"
            },
            {
                question: "Arrondir 7,34 à l'unité : ?",
                options: ["7", "8", "7,3", "7,4"],
                correct: 0,
                explanation: "7,34 arrondi à l'unité donne 7"
            },
            {
                question: "Arrondir 5,67 à l'unité : ?",
                options: ["5", "6", "5,6", "5,7"],
                correct: 1,
                explanation: "5,67 arrondi à l'unité donne 6"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        const TOTAL_QUESTIONS = 20;

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        const selectedQuestions = shuffleArray(questions).slice(0, TOTAL_QUESTIONS);

        function loadQuestion() {
            if (currentQuestion >= TOTAL_QUESTIONS) {
                showResults();
                return;
            }

            answered = false;
            const q = selectedQuestions[currentQuestion];

            document.getElementById('questionNum').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${TOTAL_QUESTIONS}`;
            document.getElementById('progressFill').style.width = `${((currentQuestion) / TOTAL_QUESTIONS) * 100}%`;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submitBtn').textContent = 'Valider';
            document.getElementById('submitBtn').disabled = false;
        }

        function selectOption(index) {
            if (answered) return;

            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
        }

        function submitAnswer() {
            if (answered) {
                currentQuestion++;
                loadQuestion();
                return;
            }

            const selected = document.querySelector('.option.selected');
            if (!selected) return;

            answered = true;
            const q = selectedQuestions[currentQuestion];
            const selectedIndex = Array.from(document.querySelectorAll('.option')).indexOf(selected);
            const isCorrect = selectedIndex === q.correct;

            if (isCorrect) {
                score++;
                selected.classList.add('correct');
                document.getElementById('feedback').classList.add('show', 'correct');
                document.getElementById('feedback').textContent = '✓ Correct ! ' + q.explanation;
            } else {
                selected.classList.add('incorrect');
                document.querySelectorAll('.option')[q.correct].classList.add('correct');
                document.getElementById('feedback').classList.add('show', 'incorrect');
                document.getElementById('feedback').textContent = '✗ Incorrect. ' + q.explanation;
            }

            document.getElementById('submitBtn').textContent = currentQuestion === TOTAL_QUESTIONS - 1 ? 'Voir les résultats' : 'Suivant';
        }

        function showResults() {
            document.getElementById('questionsSection').style.display = 'none';
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = Math.round((score / TOTAL_QUESTIONS) * 100);
            let stars = '';

            if (percentage === 100) stars = '★★★★★';
            else if (percentage >= 80) stars = '★★★★☆';
            else if (percentage >= 60) stars = '★★★☆☆';
            else if (percentage >= 40) stars = '★★☆☆☆';
            else stars = '★☆☆☆☆';

            document.getElementById('scoreNumber').textContent = score;
            document.getElementById('scorePercentage').textContent = percentage + '%';
            document.getElementById('stars').textContent = stars;

            let message = '';
            if (percentage === 100) message = 'Parfait ! Maître des décimaux ! 🚀';
            else if (percentage >= 80) message = 'Très bien ! Bon travail ! 🎉';
            else if (percentage >= 60) message = 'Bien ! Vous progressez ! 💪';
            else if (percentage >= 40) message = 'Pas mal ! Continuez vos efforts ! 📚';
            else message = 'À revoir ! Entraînez-vous davantage ! 💯';

            document.getElementById('resultMessage').textContent = message;

            const now = new Date();
            const resultCode = `v:'6_maths'|dt:${now.toISOString()}|score:${score}|pct:${percentage}|stars:${stars.length}`;
            document.getElementById('resultCode').textContent = resultCode;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('questionsSection').style.display = 'block';
            document.getElementById('resultsScreen').classList.remove('show');
            loadQuestion();
        }

        function goHome() {
            window.location.href = '/index.html';
        }

        loadQuestion();
    </script>
</body>
</html>
