<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Basics - 6ème Anglais</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #08090f;
            color: #e0e0ff;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(135deg, #1a1d2e 0%, #16192b 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #00d4ff;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff 0%, #00ff9f 50%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .theme-badge {
            display: inline-block;
            background: #00d4ff;
            color: #08090f;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2d3f;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff9f);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 12px;
            color: #9d9dff;
            font-weight: 600;
        }

        .question-container {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .question-container.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            font-size: 12px;
            color: #00d4ff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            color: #ffffff;
            line-height: 1.5;
        }

        .options {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        .option {
            padding: 15px;
            background: #2a2d3f;
            border: 2px solid #4a4d5f;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            font-weight: 500;
        }

        .option:hover {
            border-color: #00d4ff;
            background: #32354d;
        }

        .option.selected {
            background: #00d4ff;
            border-color: #00ffb3;
            color: #08090f;
        }

        .option.correct {
            background: #00d47f;
            border-color: #00ff9f;
            color: #ffffff;
        }

        .option.incorrect {
            background: #ff4757;
            border-color: #ff6b7f;
            color: #ffffff;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
            line-height: 1.6;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #00d47f33;
            border-left: 4px solid #00d47f;
            color: #00ffaf;
        }

        .feedback.incorrect {
            background: #ff475733;
            border-left: 4px solid #ff4757;
            color: #ff9db3;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #00ff9f);
            color: #08090f;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #2a2d3f;
            color: #00d4ff;
            border: 2px solid #00d4ff;
        }

        .btn-secondary:hover {
            background: #00d4ff;
            color: #08090f;
        }

        .results-screen {
            display: none;
            text-align: center;
            animation: slideIn 0.4s ease;
        }

        .results-screen.show {
            display: block;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #00ff9f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            font-size: 14px;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
            color: #08090f;
        }

        .score-max {
            font-size: 18px;
            color: #08090f;
            opacity: 0.9;
        }

        .score-percentage {
            font-size: 28px;
            font-weight: 800;
            color: #00d4ff;
            margin: 15px 0;
        }

        .stars {
            font-size: 40px;
            margin: 15px 0;
            letter-spacing: 5px;
        }

        .result-message {
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            color: #e0e0ff;
        }

        .result-code {
            background: #0a0c14;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #00ffaf;
            word-break: break-all;
            line-height: 1.6;
            overflow-x: auto;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
        }

        .back-link a:hover {
            color: #00ff9f;
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            .header h1 {
                font-size: 22px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>English Basics</h1>
            <div class="theme-badge" id="themeBadge">Classroom objects</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Question 1 / 20</div>
        </div>

        <div id="questionsSection">
            <div id="questionContainer" class="question-container active">
                <div class="question-number" id="questionNum">Question 1</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
                <div class="feedback" id="feedback"></div>
                <div class="button-group">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">Valider</button>
                </div>
            </div>
        </div>

        <div class="results-screen" id="resultsScreen">
            <h2 style="font-size: 24px; color: #e0e0ff; margin-bottom: 20px;">Résultats</h2>
            <div class="score-circle">
                <div class="score-number" id="scoreNumber">0</div>
                <div class="score-max">/ 20</div>
            </div>
            <div class="score-percentage" id="scorePercentage">0%</div>
            <div class="stars" id="stars"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-code" id="resultCode"></div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="restartQuiz()">Recommencer</button>
                <button class="btn btn-secondary" onclick="goHome()">Retour accueil</button>
            </div>
        </div>

        <div class="back-link">
            <a href="/index.html">← Retour à l'accueil</a>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What is 'table' in French?",
                options: ["chaise", "table", "crayon", "livre"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "table = table (objet dans la classe)"
            },
            {
                question: "What is 'pen' in French?",
                options: ["crayon", "stylo", "gomme", "papier"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "pen = stylo"
            },
            {
                question: "What is 'chair' in French?",
                options: ["table", "chaise", "porte", "fenêtre"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "chair = chaise"
            },
            {
                question: "What is 'pencil' in French?",
                options: ["stylo", "crayon", "papier", "livre"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "pencil = crayon"
            },
            {
                question: "What is 'book' in French?",
                options: ["cahier", "livre", "table", "chaise"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "book = livre"
            },
            {
                question: "I wake up ___ 7 o'clock.",
                options: ["in", "at", "on", "for"],
                correct: 1,
                theme: "Daily routine",
                explanation: "at 7 o'clock = à 7 heures"
            },
            {
                question: "I ___ breakfast in the morning.",
                options: ["eat", "have", "drink", "take"],
                correct: 0,
                theme: "Daily routine",
                explanation: "eat breakfast = manger un petit-déjeuner"
            },
            {
                question: "I go to school ___ 8 am.",
                options: ["in", "at", "on", "for"],
                correct: 1,
                theme: "Daily routine",
                explanation: "at 8 am = à 8h"
            },
            {
                question: "I have lunch ___.",
                options: ["at morning", "at noon", "in afternoon", "on evening"],
                correct: 1,
                theme: "Daily routine",
                explanation: "at noon = à midi"
            },
            {
                question: "I go to bed ___ 9 pm.",
                options: ["in", "at", "on", "for"],
                correct: 1,
                theme: "Daily routine",
                explanation: "at 9 pm = à 21h"
            },
            {
                question: "He is ___.",
                options: ["tall", "big", "huge", "large"],
                correct: 0,
                theme: "Describing people",
                explanation: "tall = grand"
            },
            {
                question: "She has ___ hair.",
                options: ["short", "long", "blonde", "brown"],
                correct: 0,
                theme: "Describing people",
                explanation: "short hair = cheveux courts"
            },
            {
                question: "He is ___.",
                options: ["happy", "sad", "angry", "funny"],
                correct: 0,
                theme: "Describing people",
                explanation: "happy = heureux"
            },
            {
                question: "She is ___.",
                options: ["intelligent", "smart", "clever", "bright"],
                correct: 0,
                theme: "Describing people",
                explanation: "intelligent = intelligente"
            },
            {
                question: "He has ___ eyes.",
                options: ["blue", "green", "brown", "black"],
                correct: 0,
                theme: "Describing people",
                explanation: "blue eyes = yeux bleus"
            },
            {
                question: "I like to ___.",
                options: ["play tennis", "do swimming", "go cycling", "practice football"],
                correct: 0,
                theme: "Hobbies",
                explanation: "play tennis = jouer au tennis"
            },
            {
                question: "My hobby is ___.",
                options: ["to read books", "reading books", "read books", "books reading"],
                correct: 1,
                theme: "Hobbies",
                explanation: "My hobby is reading = Mon passe-temps est la lecture"
            },
            {
                question: "I enjoy ___.",
                options: ["draw pictures", "to draw pictures", "drawing pictures", "draw the pictures"],
                correct: 2,
                theme: "Hobbies",
                explanation: "enjoy drawing = aimer dessiner"
            },
            {
                question: "She loves ___.",
                options: ["to sing", "singing", "sing", "the singing"],
                correct: 0,
                theme: "Hobbies",
                explanation: "loves to sing = aime chanter"
            },
            {
                question: "I am interested in ___.",
                options: ["play video games", "playing video games", "to play video games", "video games play"],
                correct: 1,
                theme: "Hobbies",
                explanation: "interested in = intéressé par"
            },
            {
                question: "What is 'notebook' in French?",
                options: ["livre", "cahier", "journal", "bloc-notes"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "notebook = cahier"
            },
            {
                question: "What is 'blackboard' in French?",
                options: ["tableau", "tableau noir", "ardoise", "écran"],
                correct: 0,
                theme: "Classroom objects",
                explanation: "blackboard = tableau noir"
            },
            {
                question: "I ___ at 6 in the morning.",
                options: ["wake up", "get up", "rise", "stand up"],
                correct: 0,
                theme: "Daily routine",
                explanation: "wake up = se réveiller"
            },
            {
                question: "I ___ my teeth before bed.",
                options: ["clean", "brush", "wash", "rinse"],
                correct: 1,
                theme: "Daily routine",
                explanation: "brush my teeth = me brosser les dents"
            },
            {
                question: "She is very ___.",
                options: ["nice", "kind", "sweet", "gentle"],
                correct: 0,
                theme: "Describing people",
                explanation: "nice = gentille"
            },
            {
                question: "He has ___ hair.",
                options: ["black", "dark", "dark hair", "black hair"],
                correct: 2,
                theme: "Describing people",
                explanation: "black hair = cheveux noirs"
            },
            {
                question: "What's his hobby? He likes ___.",
                options: ["play football", "playing football", "football play", "to play on football"],
                correct: 1,
                theme: "Hobbies",
                explanation: "likes playing = aime jouer"
            },
            {
                question: "What is 'eraser' in French?",
                options: ["stylo", "gomme", "crayon", "papier"],
                correct: 1,
                theme: "Classroom objects",
                explanation: "eraser = gomme"
            },
            {
                question: "I ___ a shower every morning.",
                options: ["take", "have", "do", "make"],
                correct: 0,
                theme: "Daily routine",
                explanation: "take a shower = prendre une douche"
            },
            {
                question: "She has a ___ smile.",
                options: ["beautiful", "nice", "pretty", "lovely"],
                correct: 0,
                theme: "Describing people",
                explanation: "beautiful smile = beau sourire"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        const TOTAL_QUESTIONS = 20;

        function shuffleArray(arr) {
            const copy = [...arr];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        const selectedQuestions = shuffleArray(questions).slice(0, TOTAL_QUESTIONS);

        function loadQuestion() {
            if (currentQuestion >= TOTAL_QUESTIONS) {
                showResults();
                return;
            }

            answered = false;
            const q = selectedQuestions[currentQuestion];

            document.getElementById('questionNum').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('themeBadge').textContent = q.theme;
            document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} / ${TOTAL_QUESTIONS}`;
            document.getElementById('progressFill').style.width = `${((currentQuestion) / TOTAL_QUESTIONS) * 100}%`;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = option;
                btn.onclick = () => selectOption(index);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submitBtn').textContent = 'Valider';
            document.getElementById('submitBtn').disabled = false;
        }

        function selectOption(index) {
            if (answered) return;

            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
        }

        function submitAnswer() {
            if (answered) {
                currentQuestion++;
                loadQuestion();
                return;
            }

            const selected = document.querySelector('.option.selected');
            if (!selected) return;

            answered = true;
            const q = selectedQuestions[currentQuestion];
            const selectedIndex = Array.from(document.querySelectorAll('.option')).indexOf(selected);
            const isCorrect = selectedIndex === q.correct;

            if (isCorrect) {
                score++;
                selected.classList.add('correct');
                document.getElementById('feedback').classList.add('show', 'correct');
                document.getElementById('feedback').textContent = '✓ Correct ! ' + q.explanation;
            } else {
                selected.classList.add('incorrect');
                document.querySelectorAll('.option')[q.correct].classList.add('correct');
                document.getElementById('feedback').classList.add('show', 'incorrect');
                document.getElementById('feedback').textContent = '✗ Incorrect. ' + q.explanation;
            }

            document.getElementById('submitBtn').textContent = currentQuestion === TOTAL_QUESTIONS - 1 ? 'Voir les résultats' : 'Suivant';
        }

        function showResults() {
            document.getElementById('questionsSection').style.display = 'none';
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = Math.round((score / TOTAL_QUESTIONS) * 100);
            let stars = '';

            if (percentage === 100) stars = '★★★★★';
            else if (percentage >= 80) stars = '★★★★☆';
            else if (percentage >= 60) stars = '★★★☆☆';
            else if (percentage >= 40) stars = '★★☆☆☆';
            else stars = '★☆☆☆☆';

            document.getElementById('scoreNumber').textContent = score;
            document.getElementById('scorePercentage').textContent = percentage + '%';
            document.getElementById('stars').textContent = stars;

            let message = '';
            if (percentage === 100) message = 'Excellent ! Your English is perfect ! 🚀';
            else if (percentage >= 80) message = 'Great job ! Keep it up ! 🎉';
            else if (percentage >= 60) message = 'Good ! You are improving ! 💪';
            else if (percentage >= 40) message = 'Not bad ! Keep practicing ! 📚';
            else message = 'Keep going ! Practice more ! 💯';

            document.getElementById('resultMessage').textContent = message;

            const now = new Date();
            const resultCode = `v:'6_angl'|dt:${now.toISOString()}|score:${score}|pct:${percentage}|stars:${stars.length}`;
            document.getElementById('resultCode').textContent = resultCode;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('questionsSection').style.display = 'block';
            document.getElementById('resultsScreen').classList.remove('show');
            loadQuestion();
        }

        function goHome() {
            window.location.href = '/index.html';
        }

        loadQuestion();
    </script>
</body>
</html>
